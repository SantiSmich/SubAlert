<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SubAlert</title>

<style>
*{box-sizing:border-box}
:root{--muted:#c8bde3;--purple:#833cff;--green:#66ff99;--yellow:#ffd166;--red:#ff6b7a}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top,#35106c,#070510 62%);color:white;padding:calc(28px + env(safe-area-inset-top)) 18px calc(150px + env(safe-area-inset-bottom));overflow-x:hidden}
.app{max-width:520px;margin:0 auto}
.hero{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.kicker{letter-spacing:4px;text-transform:uppercase;color:#b99cff;font-weight:900;font-size:12px}
h1{font-size:54px;line-height:.9;margin:8px 0 12px}
.sub{color:var(--muted);font-size:18px;line-height:1.35}
.plus{width:64px;height:64px;border-radius:22px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(135deg,#933cff,#5d1fd1);color:white;font-size:38px;font-weight:900}
.glass{background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(18px);box-shadow:0 18px 50px rgba(0,0,0,.28)}
.dashboard{display:grid;gap:12px;margin:24px 0 18px}
.totalBox{border-radius:30px;padding:24px}
.totalBox span,.mini span{color:var(--muted);font-weight:800}
.total{font-size:52px;font-weight:950;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini{border-radius:24px;padding:16px}
.mini strong{display:block;font-size:26px;margin-top:8px}
.saving{background:rgba(255,80,130,.14);border-color:rgba(255,120,170,.28)}
.aiBox{border-radius:30px;padding:18px;margin:18px 0}
textarea,input{width:100%;border:0;outline:0;background:transparent;color:white;font-size:17px}
textarea{min-height:110px;resize:none}
textarea::placeholder,input::placeholder{color:rgba(255,255,255,.45)}
.primary{width:100%;border:0;border-radius:22px;padding:17px;background:linear-gradient(90deg,#963cff,#6723d8);color:white;font-size:17px;font-weight:950;margin-top:12px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.quick button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:white;border-radius:22px;padding:17px;font-weight:950;font-size:16px}
.search{border-radius:24px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);padding:17px;margin:18px 0 24px}
.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section h2{font-size:34px;margin:0}
.section span{color:var(--muted);font-weight:900}
.card{border-radius:32px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.cardHead{display:flex;justify-content:space-between;gap:14px}
.name{font-size:30px;font-weight:950;letter-spacing:-.6px}
.source{color:var(--muted);margin-top:8px;font-weight:800}
.price{text-align:right;font-size:31px;font-weight:950;white-space:nowrap}
.price small{display:block;color:var(--muted);font-size:16px;margin-top:5px}
.status{margin:18px 0 14px;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.08);font-size:18px;font-weight:950}
.ok{color:var(--green)}.warn{color:var(--yellow)}.danger{color:var(--red)}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.pill{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.09);color:#d8ccff;font-weight:900;font-size:13px}
.renewal{margin:16px 0 10px;color:#ffd7dc;font-size:18px;font-weight:950}
.details{color:var(--muted);font-size:15px;line-height:1.45}
.details b{color:#d8ccff}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:18px}
.action{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);border-radius:16px;padding:12px 8px;font-weight:950;color:white}
.delete{color:var(--red)}.review{color:var(--yellow)}.keep{color:var(--green)}
.manual{display:none;border-radius:30px;padding:18px;margin:16px 0}
.manual input,.manual select{width:100%;margin-bottom:10px;padding:15px;border-radius:18px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:white;font-size:16px}
.manual option{color:black}
.empty{border-radius:28px;padding:28px;text-align:center;color:var(--muted)}
.nav{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);border-radius:26px;overflow:hidden;background:rgba(18,12,32,.9);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(22px);z-index:50}
.nav button{border:0;background:transparent;color:#d9ccff;padding:14px 8px;font-size:12px;font-weight:950}
</style>
</head>

<body>
<div class="app">
<header class="hero" id="home">
  <div>
    <div class="kicker">Memoria digital</div>
    <h1>SubAlert</h1>
    <div class="sub">DetectÃĄ, ordenÃĄ y decidÃ­ quÃĐ suscripciones valen la pena.</div>
  </div>
  <button class="plus" id="plusBtn">+</button>
</header>

<section class="dashboard">
  <div class="totalBox glass">
    <span>Total mensual estimado</span>
    <div class="total" id="total">0,00 âŽ</div>
  </div>
  <div class="grid">
    <div class="mini glass"><span>PrÃģximos 7 dÃ­as</span><strong id="weekTotal">0,00 âŽ</strong></div>
    <div class="mini glass saving"><span>Ahorro potencial</span><strong id="savingTotal">0,00 âŽ</strong></div>
  </div>
</section>

<section class="aiBox glass" id="ia">
  <textarea id="aiInput" placeholder="Ej: Spotify 11.99 mensual renovaciÃģn 9/5&#10;ChatGPT 20 USD mensual renueva el 15 de mayo&#10;Canva 120 anual"></textarea>
  <button class="primary" id="aiBtn">âĻ Cargar con IA</button>
</section>

<section class="manual glass" id="manualPanel">
  <input id="mName" placeholder="Nombre">
  <input id="mPrice" type="number" step="0.01" placeholder="Precio">
  <input id="mDate" type="date">
  <select id="mFrequency">
    <option value="monthly">Mensual</option>
    <option value="yearly">Anual</option>
    <option value="trial">Trial</option>
  </select>
  <select id="mUsage">
    <option value="alta">Uso alto</option>
    <option value="media">Uso medio</option>
    <option value="baja">Uso bajo</option>
  </select>
  <button class="primary" id="manualBtn">Guardar</button>
</section>

<div class="quick">
  <button id="mailBtn">ð Correo</button>
  <button id="smsBtn">ðą SMS</button>
</div>

<button class="primary" id="upcomingBtn">ð Ver prÃģximos cobros</button>

<input class="search" id="search" placeholder="Buscar suscripciÃģn...">

<div class="section" id="listSection">
  <h2>Suscripciones</h2>
  <span id="count">0 activas</span>
</div>

<div id="list"></div>
</div>

<nav class="nav">
  <button data-nav="home">Inicio</button>
  <button data-nav="ia">IA</button>
  <button id="navAdd">Agregar</button>
  <button data-nav="listSection">Lista</button>
</nav>

<script>
let subs = JSON.parse(localStorage.getItem("subs") || "[]");

const $ = id => document.getElementById(id);

const monthMap = {
  enero:1, febrero:2, marzo:3, abril:4, mayo:5, junio:6,
  julio:7, agosto:8, septiembre:9, setiembre:9, octubre:10,
  noviembre:11, diciembre:12
};

const numberWords = {
  "uno":1,"una":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7,
  "ocho":8,"nueve":9,"diez":10,"once":11,"doce":12,"trece":13,"catorce":14,
  "quince":15,"dieciseis":16,"diecisÃĐis":16,"diecisiete":17,"dieciocho":18,
  "diecinueve":19,"veinte":20,"veintiuno":21,"veintidos":22,"veintidÃģs":22,
  "veintitres":23,"veintitrÃĐs":23,"veinticuatro":24,"veinticinco":25,
  "veintiseis":26,"veintisÃĐis":26,"veintisiete":27,"veintiocho":28,
  "veintinueve":29,"treinta":30,"treinta y uno":31
};

function save(){ localStorage.setItem("subs", JSON.stringify(subs)); }

function money(n, currency="EUR"){
  const symbol = currency === "USD" ? "$" : "âŽ";
  return Number(n || 0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2}) + " " + symbol;
}

function monthlyCost(s){
  const price = Number(s.price || 0);
  if(s.frequency === "yearly") return price / 12;
  return price;
}

function daysUntil(date){
  if(!date) return null;
  const today = new Date();
  const target = new Date(date + "T00:00:00");
  today.setHours(0,0,0,0);
  return Math.ceil((target - today)/(1000*60*60*24));
}

function formatDate(date){
  if(!date) return "";
  return new Date(date+"T00:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short"});
}

function makeDate(day, month){
  const today = new Date();
  let year = today.getFullYear();
  const candidate = new Date(year, month - 1, day);
  const cleanToday = new Date();
  cleanToday.setHours(0,0,0,0);
  if(candidate < cleanToday) year++;
  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

function parseDate(text){
  const lower = normalizeText(text);

  let m = lower.match(/(\d{1,2})[\/\-](\d{1,2})/);
  if(m) return makeDate(Number(m[1]), Number(m[2]));

  m = lower.match(/(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/);
  if(m) return makeDate(Number(m[1]), monthMap[m[2]]);

  for(const word in numberWords){
    for(const month in monthMap){
      if(lower.includes(`${word} de ${month}`)){
        return makeDate(numberWords[word], monthMap[month]);
      }
    }
  }

  return "";
}

function normalizeText(text){
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function parseCurrency(text){
  const lower = normalizeText(text);
  if(lower.includes("usd") || lower.includes("dolar") || lower.includes("$")) return "USD";
  return "EUR";
}

function parseFrequency(text){
  const lower = normalizeText(text);
  if(lower.includes("anual") || lower.includes("aÃąo") || lower.includes("year")) return "yearly";
  if(lower.includes("trial") || lower.includes("prueba")) return "trial";
  return "monthly";
}

function cleanName(text){
  let name = normalizeText(text);

  name = name
    .replace(/\d+([.,]\d+)?/g,"")
    .replace(/\d{1,2}[\/\-]\d{1,2}/g,"")
    .replace(/\d{1,2}\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/gi,"")
    .replace(/mensual|mes|anual|aÃąo|yearly|monthly|trial|prueba/gi,"")
    .replace(/usd|eur|euro|euros|dolar|dolares|\$|âŽ/gi,"")
    .replace(/renovacion|renueva|renueva el|fecha|cobro|proximo|prÃģximo/gi,"");

  Object.keys(monthMap).forEach(month=>{
    name = name.replace(new RegExp(month,"gi"),"");
  });

  Object.keys(numberWords).forEach(word=>{
    name = name.replace(new RegExp("\\b"+word+"\\b","gi"),"");
  });

  name = name
    .replace(/\bde\b|\bel\b|\bla\b|\blos\b|\blas\b|\by\b/gi,"")
    .replace(/[^\w\s]/gi,"")
    .replace(/\s+/g," ")
    .trim();

  return name.replace(/\b\w/g,c=>c.toUpperCase());
}

function score(s){
  let n=0;
  if(s.usage==="baja") n+=5;
  if(s.usage==="media") n+=2;
  if(monthlyCost(s)>10) n+=2;
  if(monthlyCost(s)>20) n+=3;
  if(s.frequency==="yearly") n+=1;
  if(!s.date) n+=1;
  return Math.min(n,10);
}

function label(n){
  if(n>=8) return ["danger","ðī Cancelar ya"];
  if(n>=5) return ["warn","ðĄ Revisar"];
  return ["ok","ðĒ Mantener"];
}

function renewalText(s){
  const d=daysUntil(s.date);
  if(d===null) return "Sin fecha de renovaciÃģn";
  if(d===0) return "Hoy te cobran";
  if(d>0) return `En ${d} dÃ­as Â· ${formatDate(s.date)}`;
  return "Fecha pasada";
}

function splitEntries(raw){
  return raw
    .split(/\n|;|,(?=\s*[A-Za-zÃÃÃÃÃÃĄÃĐÃ­ÃģÃšÃÃą])/)
    .map(x=>x.trim())
    .filter(Boolean);
}

function parseAI(){
  const raw = $("aiInput").value.trim();
  if(!raw) return alert("EscribÃ­ una suscripciÃģn primero");

  const parts = splitEntries(raw);
  let added = 0;

  parts.forEach(line=>{
    const priceMatch = line.match(/\d+([.,]\d+)?/);
    if(!priceMatch) return;

    const price = Number(priceMatch[0].replace(",","."));
    const name = cleanName(line);
    const date = parseDate(line);
    const currency = parseCurrency(line);
    const frequency = parseFrequency(line);

    if(!name || !price) return;

    const exists = subs.some(s => s.name.toLowerCase() === name.toLowerCase());
    if(exists) return;

    subs.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
      name,
      price,
      currency,
      frequency,
      date,
      usage:"media",
      source:"IA"
    });

    added++;
  });

  $("aiInput").value="";
  save();
  render();

  alert(added ? `CarguÃĐ ${added} suscripciÃģn/es.` : "No encontrÃĐ suscripciones nuevas o ya estaban cargadas.");
}

function addManual(){
  const name=$("mName").value.trim();
  const price=Number($("mPrice").value);
  const date=$("mDate").value;
  const usage=$("mUsage").value;
  const frequency=$("mFrequency").value;

  if(!name) return alert("Falta el nombre");
  if(!price) return alert("Falta el precio");

  subs.unshift({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
    name, price, date, usage, frequency, currency:"EUR", source:"Manual"
  });

  $("mName").value="";
  $("mPrice").value="";
  $("mDate").value="";
  $("manualPanel").style.display="none";
  save();
  render();
}

function render(){
  const search=$("search").value.toLowerCase();
  const filtered=subs.filter(s=>s.name.toLowerCase().includes(search));

  const total=subs.reduce((a,s)=>a+monthlyCost(s),0);
  const week=subs.filter(s=>{const d=daysUntil(s.date);return d!==null&&d>=0&&d<=7}).reduce((a,s)=>a+Number(s.price||0),0);
  const saving=subs.filter(s=>s.usage==="baja").reduce((a,s)=>a+monthlyCost(s),0);

  $("total").innerText=money(total);
  $("weekTotal").innerText=money(week);
  $("savingTotal").innerText=money(saving);
  $("count").innerText=`${subs.length} activas`;

  if(!filtered.length){
    $("list").innerHTML=`<div class="empty glass">No hay suscripciones cargadas.</div>`;
    return;
  }

  $("list").innerHTML=filtered.map(s=>{
    const sc=score(s);
    const [cls,txt]=label(sc);
    const freqLabel = s.frequency === "yearly" ? "Anual" : s.frequency === "trial" ? "Trial" : "Mensual";
    const pricePeriod = s.frequency === "yearly" ? "/ aÃąo" : s.frequency === "trial" ? "/ trial" : "/ mes";

    return `
    <article class="card glass">
      <div class="cardHead">
        <div>
          <div class="name">${escapeHTML(s.name)}</div>
          <div class="source">${escapeHTML(s.source || "Manual")}</div>
        </div>
        <div class="price">${money(s.price, s.currency)}<small>${pricePeriod}</small></div>
      </div>
      <div class="status ${cls}">${txt}</div>
      <div class="meta"><span class="pill">${freqLabel}</span><span class="pill">Uso: ${s.usage}</span></div>
      <div class="renewal">ð ${renewalText(s)}</div>
      <div class="details">
        <div><b>Coste mensual:</b> ${money(monthlyCost(s), s.currency)}</div>
        <div><b>Score:</b> ${sc}/10</div>
      </div>
      <div class="actions">
        <button class="action delete" data-action="delete" data-id="${s.id}">Eliminar</button>
        <button class="action review" data-action="review" data-id="${s.id}">Revisar</button>
        <button class="action keep" data-action="keep" data-id="${s.id}">Mantener</button>
      </div>
    </article>`;
  }).join("");
}

function escapeHTML(str){
  return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function showUpcoming(){
  const upcoming=subs.filter(s=>{const d=daysUntil(s.date);return d!==null&&d>=0&&d<=14})
    .map(s=>`âĒ ${s.name}: ${renewalText(s)}`).join("\n");
  alert(upcoming ? "PrÃģximos cobros:\n\n"+upcoming : "No tenÃĐs cobros prÃģximos cargados.");
}

function toggleManual(){
  const box=$("manualPanel");
  box.style.display=box.style.display==="block"?"none":"block";
  if(box.style.display==="block") box.scrollIntoView({behavior:"smooth",block:"center"});
}

$("aiBtn").addEventListener("click", parseAI);
$("plusBtn").addEventListener("click", toggleManual);
$("navAdd").addEventListener("click", toggleManual);
$("manualBtn").addEventListener("click", addManual);
$("upcomingBtn").addEventListener("click", showUpcoming);
$("mailBtn").addEventListener("click", ()=>alert("Correo conectado en prÃģxima versiÃģn"));
$("smsBtn").addEventListener("click", ()=>alert("SMS en prueba"));
$("search").addEventListener("input", render);

document.querySelectorAll("[data-nav]").forEach(btn=>{
  btn.addEventListener("click",()=>$(btn.dataset.nav).scrollIntoView({behavior:"smooth"}));
});

$("list").addEventListener("click", e=>{
  const btn=e.target.closest("button[data-action]");
  if(!btn) return;

  const id=btn.dataset.id;
  const action=btn.dataset.action;

  if(action==="delete") subs=subs.filter(s=>s.id!==id);
  if(action==="review") subs=subs.map(s=>s.id===id?{...s,usage:"baja"}:s);
  if(action==="keep") subs=subs.map(s=>s.id===id?{...s,usage:"alta"}:s);

  save();
  render();
});

render();
</script>
</body>
</html>
