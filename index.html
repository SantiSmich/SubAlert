<script>
let subs = JSON.parse(localStorage.getItem("subs") || "[]");
let editingId = null;

const $ = id => document.getElementById(id);

const EXCHANGE = {
  EUR: 1,
  USD: 0.93
};

function toEUR(amount, currency = "EUR") {
  return Number(amount || 0) * (EXCHANGE[currency] || 1);
}

const brandMap = {
  spotify:"Spotify",
  netflix:"Netflix",
  chatgpt:"ChatGPT",
  openai:"OpenAI",
  canva:"Canva",
  disney:"Disney+",
  disneyplus:"Disney+",
  amazon:"Amazon",
  prime:"Amazon Prime",
  suno:"Suno",
  moises:"Moises",
  afa:"AFA Play",
  youtube:"YouTube",
  google:"Google"
};

const categories = {
  music:["spotify","youtube music","apple music","deezer","tidal"],
  video:["netflix","disney","prime","amazon prime","hbo","max","skyshowtime"],
  ai:["chatgpt","openai","suno"],
  design:["canva","adobe"],
  audio:["moises","suno"],
  cloud:["google","icloud","dropbox"]
};

const monthMap = {
  enero:1, febrero:2, marzo:3, abril:4, mayo:5, junio:6,
  julio:7, agosto:8, septiembre:9, setiembre:9, octubre:10,
  noviembre:11, diciembre:12
};

const numberWords = {
  "uno":1,"una":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7,
  "ocho":8,"nueve":9,"diez":10,"once":11,"doce":12,"trece":13,"catorce":14,
  "quince":15,"dieciseis":16,"dieciséis":16,"diecisiete":17,"dieciocho":18,
  "diecinueve":19,"veinte":20,"veintiuno":21,"veintidos":22,"veintidós":22,
  "veintitres":23,"veintitrés":23,"veinticuatro":24,"veinticinco":25,
  "veintiseis":26,"veintiséis":26,"veintisiete":27,"veintiocho":28,
  "veintinueve":29,"treinta":30,"treinta y uno":31
};

function save(){
  localStorage.setItem("subs", JSON.stringify(subs));
}

function normalizeText(text){
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function money(n, currency="EUR"){
  const symbol = currency === "USD" ? "$" : "€";
  return Number(n || 0).toLocaleString("es-ES", {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + " " + symbol;
}

function moneyEUR(n){
  return Number(n || 0).toLocaleString("es-ES", {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + " €";
}

function monthlyCost(s){
  const price = Number(s.price || 0);
  if(s.frequency === "yearly") return price / 12;
  return price;
}

function monthlyEUR(s){
  return toEUR(monthlyCost(s), s.currency || "EUR");
}

function displayMonthlyCost(s){
  const base = money(monthlyCost(s), s.currency || "EUR");

  if((s.currency || "EUR") !== "EUR"){
    return `${base} (~${moneyEUR(monthlyEUR(s))})`;
  }

  return base;
}

function daysUntil(date){
  if(!date) return null;

  const today = new Date();
  const target = new Date(date + "T00:00:00");

  today.setHours(0,0,0,0);

  return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

function formatDate(date){
  if(!date) return "";
  return new Date(date + "T00:00:00").toLocaleDateString("es-ES", {
    day:"numeric",
    month:"short"
  });
}

function makeDate(day, month){
  const today = new Date();
  let year = today.getFullYear();

  const candidate = new Date(year, month - 1, day);
  const cleanToday = new Date();

  cleanToday.setHours(0,0,0,0);

  if(candidate < cleanToday) year++;

  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

function parseDate(text){
  const lower = normalizeText(text);

  let m = lower.match(/(\d{1,2})[\/\-](\d{1,2})/);
  if(m) return makeDate(Number(m[1]), Number(m[2]));

  m = lower.match(/(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/);
  if(m) return makeDate(Number(m[1]), monthMap[m[2]]);

  for(const word in numberWords){
    for(const month in monthMap){
      if(lower.includes(`${word} de ${month}`)){
        return makeDate(numberWords[word], monthMap[month]);
      }
    }
  }

  return "";
}

function parseCurrency(text){
  const lower = normalizeText(text);

  if(lower.includes("usd") || lower.includes("dolar") || lower.includes("$")){
    return "USD";
  }

  return "EUR";
}

function parseFrequency(text){
  const lower = normalizeText(text);

  if(lower.includes("anual") || lower.includes("año") || lower.includes("year")){
    return "yearly";
  }

  if(lower.includes("trial") || lower.includes("prueba")){
    return "trial";
  }

  return "monthly";
}

function normalizeBrand(name){
  const key = normalizeText(name).replace(/\s+/g,"");
  return brandMap[key] || name;
}

function detectUsage(name){
  const n = normalizeText(name);

  if(n.includes("spotify") || n.includes("netflix") || n.includes("disney")){
    return "alta";
  }

  if(n.includes("chatgpt") || n.includes("canva") || n.includes("suno") || n.includes("moises")){
    return "media";
  }

  return "baja";
}

function getCategory(name){
  const n = normalizeText(name);

  for(const cat in categories){
    if(categories[cat].some(item => n.includes(item))){
      return cat;
    }
  }

  return "other";
}

function cleanName(text){
  let name = normalizeText(text);

  name = name
    .replace(/\d+([.,]\d+)?/g,"")
    .replace(/\d{1,2}[\/\-]\d{1,2}/g,"")
    .replace(/\d{1,2}\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/gi,"")
    .replace(/mensual|mes|anual|año|yearly|monthly|trial|prueba/gi,"")
    .replace(/usd|eur|euro|euros|dolar|dolares|\$|€/gi,"")
    .replace(/renovacion|renueva|renueva el|fecha|cobro|proximo|próximo/gi,"");

  Object.keys(monthMap).forEach(month=>{
    name = name.replace(new RegExp(month,"gi"),"");
  });

  Object.keys(numberWords).forEach(word=>{
    name = name.replace(new RegExp("\\b"+word+"\\b","gi"),"");
  });

  name = name
    .replace(/\bde\b|\bel\b|\bla\b|\blos\b|\blas\b|\by\b/gi,"")
    .replace(/[^\w\s]/gi,"")
    .replace(/\s+/g," ")
    .trim()
    .replace(/\b\w/g,c=>c.toUpperCase());

  return normalizeBrand(name);
}

function duplicateExists(name, ignoreId=null){
  const n = normalizeText(name);

  return subs.some(s => {
    if(ignoreId && s.id === ignoreId) return false;

    const existing = normalizeText(s.name);

    return existing.includes(n) || n.includes(existing);
  });
}

function score(s){
  let n = 0;

  if(s.usage === "baja") n += 5;
  if(s.usage === "media") n += 2;

  if(monthlyEUR(s) > 10) n += 2;
  if(monthlyEUR(s) > 20) n += 3;

  if(s.frequency === "yearly") n += 1;
  if(!s.date) n += 1;

  const cat = getCategory(s.name);
  const sameCategory = subs.filter(x => getCategory(x.name) === cat && cat !== "other");

  if(sameCategory.length > 1) n += 1;

  return Math.min(n,10);
}

function label(n){
  if(n >= 7) return ["danger","🔴 Cancelar pronto"];
  if(n >= 4) return ["warn","🟡 Revisar"];
  return ["ok","🟢 Mantener"];
}

function explainSub(s){
  const reasons = [];
  const m = monthlyEUR(s);
  const cat = getCategory(s.name);
  const sameCategory = subs.filter(x => getCategory(x.name) === cat && cat !== "other");

  if(s.usage === "alta"){
    reasons.push("La marcaste como uso alto, por eso no parece una cancelación urgente.");
  }

  if(s.usage === "media"){
    reasons.push("Tiene uso medio: conviene revisar si realmente la aprovechás.");
  }

  if(s.usage === "baja"){
    reasons.push("Tiene uso bajo: es candidata fuerte a cancelación.");
  }

  if(m > 20){
    reasons.push("Tiene un coste mensual alto.");
  } else if(m > 10){
    reasons.push("Tiene un coste mensual medio/alto.");
  } else {
    reasons.push("Su coste mensual no es especialmente alto.");
  }

  if(s.frequency === "yearly"){
    reasons.push("Es anual: puede doler menos mes a mes, pero suma en el año.");
  }

  if(!s.date){
    reasons.push("No tiene fecha de renovación cargada, así que hay menos control.");
  }

  if(sameCategory.length > 1){
    reasons.push("Puede solaparse parcialmente con otra herramienta de la misma familia.");
  }

  return reasons;
}

function renewalText(s){
  const d = daysUntil(s.date);

  if(d === null) return "Sin fecha de renovación";
  if(d === 0) return "Hoy te cobran";
  if(d > 0) return `En ${d} días · ${formatDate(s.date)}`;

  return "Fecha pasada";
}

function splitEntries(raw){
  return raw
    .split(/\n|;|,(?=\s*[A-Za-zÁÉÍÓÚáéíóúÑñ])/)
    .map(x=>x.trim())
    .filter(Boolean);
}

function parseAI(){
  const raw = $("aiInput").value.trim();

  if(!raw) return alert("Escribí una suscripción primero");

  const parts = splitEntries(raw);
  let added = 0;

  parts.forEach(line=>{
    const priceMatch = line.match(/\d+([.,]\d+)?/);

    if(!priceMatch) return;

    const price = Number(priceMatch[0].replace(",","."));
    const name = cleanName(line);
    const date = parseDate(line);
    const currency = parseCurrency(line);
    const frequency = parseFrequency(line);
    const usage = detectUsage(name);

    if(!name || !price) return;
    if(duplicateExists(name)) return;

    subs.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
      name,
      price,
      currency,
      frequency,
      date,
      usage,
      source:"IA"
    });

    added++;
  });

  $("aiInput").value = "";

  save();
  render();

  alert(added ? `Cargué ${added} suscripción/es.` : "No encontré suscripciones nuevas o ya estaban cargadas.");
}

function addManual(){
  const name = normalizeBrand($("mName").value.trim());
  const price = Number($("mPrice").value);
  const date = $("mDate").value;
  const usage = $("mUsage").value;
  const frequency = $("mFrequency").value;

  if(!name) return alert("Falta el nombre");
  if(!price) return alert("Falta el precio");

  if(editingId){
    subs = subs.map(s =>
      s.id === editingId
        ? {...s, name, price, date, usage, frequency, currency:s.currency || "EUR"}
        : s
    );

    editingId = null;
  } else {
    if(duplicateExists(name)) return alert("Ya existe una suscripción parecida.");

    subs.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
      name,
      price,
      date,
      usage,
      frequency,
      currency:"EUR",
      source:"Manual"
    });
  }

  clearManual();

  $("manualPanel").style.display = "none";

  save();
  render();
}

function clearManual(){
  $("mName").value = "";
  $("mPrice").value = "";
  $("mDate").value = "";
  $("mUsage").value = "media";
  $("mFrequency").value = "monthly";
}

function editSub(id){
  const s = subs.find(x => x.id === id);

  if(!s) return;

  editingId = id;

  $("mName").value = s.name;
  $("mPrice").value = s.price;
  $("mDate").value = s.date || "";
  $("mUsage").value = s.usage || "media";
  $("mFrequency").value = s.frequency || "monthly";

  $("manualPanel").style.display = "block";
  $("manualPanel").scrollIntoView({behavior:"smooth", block:"center"});
}

function getInsights(){
  const total = subs.reduce((a,s)=>a + monthlyEUR(s), 0);
  const yearly = total * 12;

  const topExpenses = [...subs]
    .sort((a,b)=>monthlyEUR(b) - monthlyEUR(a))
    .slice(0,3);

  const cancelCandidates = [...subs]
    .sort((a,b)=>score(b) - score(a))
    .slice(0,3);

  const duplicateCategories = [];

  Object.keys(categories).forEach(cat=>{
    const group = subs.filter(s => getCategory(s.name) === cat);

    if(group.length > 1){
      duplicateCategories.push({cat, group});
    }
  });

  return {total, yearly, topExpenses, cancelCandidates, duplicateCategories};
}

function renderRankings(){
  const insights = getInsights();

  let html = "";

  if(insights.topExpenses.length){
    html += `<div class="details"><b>Top gastos:</b></div>`;

    insights.topExpenses.forEach(s=>{
      html += `
        <div class="rankItem">
          <strong>${escapeHTML(s.name)}</strong>
          <span>${displayMonthlyCost(s)}/mes</span>
        </div>
      `;
    });
  }

  if(insights.cancelCandidates.length){
    html += `<div class="details" style="margin-top:14px"><b>Prioridad de revisión:</b></div>`;

    insights.cancelCandidates.forEach(s=>{
      html += `
        <div class="rankItem">
          <strong>${escapeHTML(s.name)}</strong>
          <span>Score ${score(s)}/10</span>
        </div>
      `;
    });
  }

  if(insights.duplicateCategories.length){
    html += `<div class="details" style="margin-top:14px"><b>Posibles solapamientos:</b></div>`;

    insights.duplicateCategories.forEach(item=>{
      html += `
        <div class="insight">
          Tenés varias herramientas de ${item.cat}: ${item.group.map(x=>x.name).join(", ")}.
          Pueden solaparse parcialmente, pero no necesariamente reemplazarse.
        </div>
      `;
    });
  }

  $("rankList").innerHTML = html || `<div class="details">Agregá suscripciones para ver recomendaciones.</div>`;
}

function askAdvisor(){
  if(!subs.length) return alert("Todavía no hay suscripciones para analizar.");

  const question = normalizeText($("advisorInput").value);
  const insights = getInsights();

  const reviewList = insights.cancelCandidates.filter(s => score(s) >= 4);
  const urgentList = insights.cancelCandidates.filter(s => score(s) >= 7);
  const top = insights.topExpenses[0];
  const worst = reviewList[0] || insights.cancelCandidates[0];

  let msg = `Gastás aproximadamente ${moneyEUR(insights.total)} al mes (${moneyEUR(insights.yearly)} al año).\n\n`;

  if(question.includes("cancel") || question.includes("eliminar") || question.includes("quitar")){
    if(urgentList.length){
      const s = urgentList[0];

      msg += `La primera candidata a cancelar sería ${s.name}.\n`;
      msg += `Score: ${score(s)}/10.\n\n`;
      msg += explainSub(s).map(r=>`• ${r}`).join("\n");
      msg += `\n\nAhorro estimado: ${moneyEUR(monthlyEUR(s))} al mes.`;
    } else if(reviewList.length){
      const s = reviewList[0];

      msg += `No veo una cancelación urgente, pero revisaría primero ${s.name}.\n`;
      msg += `Score: ${score(s)}/10.\n\n`;
      msg += explainSub(s).map(r=>`• ${r}`).join("\n");
      msg += `\n\nAhorro posible: ${moneyEUR(monthlyEUR(s))} al mes.`;
    } else {
      msg += "No veo ninguna suscripción claramente cancelable ahora mismo.";
    }

  } else if(question.includes("car") || question.includes("gasto")){
    msg += `Tu mayor gasto es ${top.name}: ${displayMonthlyCost(top)} al mes.\n\n`;
    msg += explainSub(top).map(r=>`• ${r}`).join("\n");

  } else if(question.includes("ahorrar")){
    const options = reviewList;
    const possible = options.reduce((a,s)=>a + monthlyEUR(s), 0);

    msg += `Podrías revisar ${options.length} suscripción/es y liberar aproximadamente ${moneyEUR(possible)} al mes.\n\n`;
    msg += options.map(s=>`• ${s.name}: ${displayMonthlyCost(s)}/mes · Score ${score(s)}/10`).join("\n");

  } else if(question.includes("repet") || question.includes("solap") || question.includes("duplic")){
    if(insights.duplicateCategories.length){
      const dup = insights.duplicateCategories[0];

      msg += `Detecté posible solapamiento en ${dup.cat}: ${dup.group.map(x=>x.name).join(", ")}.\n\n`;
      msg += "Pueden compartir parte del uso, pero no necesariamente reemplazarse. Conviene comparar qué función cumple cada una.";
    } else {
      msg += "No veo suscripciones claramente repetidas.";
    }

  } else {
    if(worst){
      msg += `La revisión más razonable sería ${worst.name}: score ${score(worst)}/10.\n\n`;
      msg += explainSub(worst).map(r=>`• ${r}`).join("\n");
    } else {
      msg += "No veo una cancelación urgente. Revisaría las que tengan uso bajo, coste alto o fecha de renovación cercana.";
    }
  }

  alert(msg);
}

function render(){
  const search = $("search").value.toLowerCase();

  const filtered = subs.filter(s => s.name.toLowerCase().includes(search));

  const total = subs.reduce((a,s)=>a + monthlyEUR(s), 0);

  const week = subs
    .filter(s=>{
      const d = daysUntil(s.date);
      return d !== null && d >= 0 && d <= 7;
    })
    .reduce((a,s)=>a + monthlyEUR(s), 0);

  const saving = subs
    .filter(s=>score(s) >= 4)
    .reduce((a,s)=>a + monthlyEUR(s), 0);

  $("total").innerText = moneyEUR(total);
  $("yearlyTotal").innerText = `${moneyEUR(total * 12)} al año`;
  $("weekTotal").innerText = moneyEUR(week);
  $("savingTotal").innerText = moneyEUR(saving);
  $("count").innerText = `${subs.length} activas`;

  renderRankings();

  if(!filtered.length){
    $("list").innerHTML = `<div class="empty glass">No hay suscripciones cargadas.</div>`;
    return;
  }

  $("list").innerHTML = filtered.map(s=>{
    const sc = score(s);
    const [cls,txt] = label(sc);

    const freqLabel = s.frequency === "yearly" ? "Anual" : s.frequency === "trial" ? "Trial" : "Mensual";
    const pricePeriod = s.frequency === "yearly" ? "/ año" : s.frequency === "trial" ? "/ trial" : "/ mes";

    const reasons = explainSub(s)
      .slice(0,2)
      .map(r=>`<div>• ${escapeHTML(r)}</div>`)
      .join("");

    return `
      <article class="card glass">
        <div class="cardHead">
          <div>
            <div class="name">${escapeHTML(s.name)}</div>
            <div class="source">${escapeHTML(s.source || "Manual")}</div>
          </div>

          <div class="price">
            ${money(s.price, s.currency)}
            <small>${pricePeriod}</small>
          </div>
        </div>

        <div class="status ${cls}">${txt}</div>

        <div class="meta">
          <span class="pill">${freqLabel}</span>
          <span class="pill">Uso: ${s.usage}</span>
        </div>

        <div class="renewal">🔔 ${renewalText(s)}</div>

        <div class="details">
          <div><b>Coste mensual real:</b> ${displayMonthlyCost(s)}</div>
          <div><b>Score:</b> ${sc}/10</div>
          <div style="margin-top:8px">${reasons}</div>
        </div>

        <div class="actions">
          <button class="action delete" data-action="delete" data-id="${s.id}">Eliminar</button>
          <button class="action review" data-action="review" data-id="${s.id}">Revisar</button>
          <button class="action keep" data-action="keep" data-id="${s.id}">Mantener</button>
          <button class="action edit" data-action="edit" data-id="${s.id}">Editar</button>
        </div>
      </article>
    `;
  }).join("");
}

function escapeHTML(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function showUpcoming(){
  const upcoming = subs
    .filter(s=>{
      const d = daysUntil(s.date);
      return d !== null && d >= 0 && d <= 30;
    })
    .map(s=>`• ${s.name}: ${renewalText(s)}`)
    .join("\n");

  alert(upcoming ? "Próximos cobros:\n\n" + upcoming : "No tenés cobros próximos cargados.");
}

function toggleManual(){
  const box = $("manualPanel");

  box.style.display = box.style.display === "block" ? "none" : "block";

  if(box.style.display === "block"){
    box.scrollIntoView({behavior:"smooth", block:"center"});
  }
}

$("aiBtn").addEventListener("click", parseAI);
$("plusBtn").addEventListener("click", toggleManual);
$("navAdd").addEventListener("click", toggleManual);
$("manualBtn").addEventListener("click", addManual);
$("upcomingBtn").addEventListener("click", showUpcoming);
$("advisorBtn").addEventListener("click", askAdvisor);
$("mailBtn").addEventListener("click", ()=>alert("Correo conectado en próxima versión"));
$("smsBtn").addEventListener("click", ()=>alert("SMS en prueba"));
$("search").addEventListener("input", render);

document.querySelectorAll("[data-nav]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    $(btn.dataset.nav).scrollIntoView({behavior:"smooth"});
  });
});

$("list").addEventListener("click", e=>{
  const btn = e.target.closest("button[data-action]");

  if(!btn) return;

  const id = btn.dataset.id;
  const action = btn.dataset.action;

  if(action === "delete"){
    subs = subs.filter(s=>s.id !== id);
  }

  if(action === "review"){
    subs = subs.map(s=>s.id === id ? {...s, usage:"baja"} : s);
  }

  if(action === "keep"){
    subs = subs.map(s=>s.id === id ? {...s, usage:"alta"} : s);
  }

  if(action === "edit"){
    return editSub(id);
  }

  save();
  render();
});

render();
</script>
