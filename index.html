<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#35106c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SubAlert">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SubAlert</title>

<style>
*{box-sizing:border-box}
:root{
  --muted:#c8bde3;
  --purple:#833cff;
  --purple2:#6723d8;
  --green:#66ff99;
  --yellow:#ffd166;
  --red:#ff6b7a;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:radial-gradient(circle at top,#35106c,#070510 62%);
  color:white;
  padding:calc(28px + env(safe-area-inset-top)) 18px calc(170px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
.app{max-width:520px;margin:0 auto}
.glass{
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:0 18px 50px rgba(0,0,0,.28);
}
.hero{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.kicker{letter-spacing:4px;text-transform:uppercase;color:#b99cff;font-weight:900;font-size:12px}
h1{font-size:54px;line-height:.9;margin:8px 0 12px}
.sub{color:var(--muted);font-size:18px;line-height:1.35}
.plus{
  width:64px;height:64px;border-radius:22px;border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(135deg,#933cff,#5d1fd1);color:white;font-size:38px;font-weight:900
}
.dashboard{display:grid;gap:12px;margin:24px 0 18px}
.totalBox{border-radius:30px;padding:24px}
.totalBox span,.mini span{color:var(--muted);font-weight:800}
.total{font-size:52px;font-weight:950;margin-top:8px}
.yearly{color:#d8ccff;font-size:17px;font-weight:800;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini{border-radius:24px;padding:16px}
.mini strong{display:block;font-size:26px;margin-top:8px}
.saving{background:rgba(255,80,130,.14);border-color:rgba(255,120,170,.28)}
.aiBox,.manual,.advisor,.rankBox{border-radius:30px;padding:18px;margin:18px 0}
textarea,input,select{
  width:100%;border:0;outline:0;background:transparent;color:white;font-size:17px
}
textarea{min-height:110px;resize:none}
textarea::placeholder,input::placeholder{color:rgba(255,255,255,.45)}
.primary{
  width:100%;border:0;border-radius:22px;padding:17px;
  background:linear-gradient(90deg,#963cff,#6723d8);color:white;font-size:17px;font-weight:950;margin-top:12px
}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.quick button{
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);
  color:white;border-radius:22px;padding:17px;font-weight:950;font-size:16px
}
.search{border-radius:24px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);padding:17px;margin:18px 0 24px}
.section{display:flex;justify-content:space-between;align-items:center;margin:26px 0 14px}
.section h2{font-size:34px;margin:0}
.section span{color:var(--muted);font-weight:900}
.card{border-radius:32px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.cardHead{display:flex;justify-content:space-between;gap:14px}
.name{font-size:30px;font-weight:950;letter-spacing:-.6px}
.source{color:var(--muted);margin-top:8px;font-weight:800}
.price{text-align:right;font-size:31px;font-weight:950;white-space:nowrap}
.price small{display:block;color:var(--muted);font-size:16px;margin-top:5px}
.status{margin:18px 0 14px;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.08);font-size:18px;font-weight:950}
.ok{color:var(--green)}.warn{color:var(--yellow)}.danger{color:var(--red)}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.pill{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.09);color:#d8ccff;font-weight:900;font-size:13px}
.renewal{margin:16px 0 10px;color:#ffd7dc;font-size:18px;font-weight:950}
.details{color:var(--muted);font-size:15px;line-height:1.45}
.details b{color:#d8ccff}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
.action{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);border-radius:16px;padding:12px 7px;font-weight:950;color:white;font-size:13px}
.delete{color:var(--red)}.review{color:var(--yellow)}.keep{color:var(--green)}.edit{color:#d8ccff}
.manual{display:none}
.manual input,.manual select{
  margin-bottom:10px;padding:15px;border-radius:18px;border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.07);color:white;font-size:16px
}
.manual option{color:black}
.empty{border-radius:28px;padding:28px;text-align:center;color:var(--muted)}
.rankItem{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.rankItem:last-child{border-bottom:0}
.rankItem strong{font-size:16px}
.rankItem span{color:var(--muted);font-weight:800;text-align:right}
.insight{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  padding:14px;
  border-radius:18px;
  margin:10px 0;
  color:#d8ccff;
  line-height:1.35;
  font-weight:750;
}
.answerBox{
  display:none;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:16px;
  margin-top:14px;
  color:#f2ecff;
  line-height:1.45;
  white-space:pre-line;
}
.nav{
  position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));
  max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);
  border-radius:26px;overflow:hidden;background:rgba(18,12,32,.9);
  border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);z-index:50
}
.nav button{border:0;background:transparent;color:#d9ccff;padding:14px 8px;font-size:12px;font-weight:950}
</style>
</head>

<body>
<div class="app">

<header class="hero" id="home">
  <div>
    <div class="kicker">Memoria digital</div>
    <h1>SubAlert</h1>
    <div class="sub">Detectá, ordená y decidí qué suscripciones valen la pena.</div>
  </div>
  <button class="plus" id="plusBtn">+</button>
</header>

<section class="dashboard">
  <div class="totalBox glass">
    <span>Total mensual estimado</span>
    <div class="total" id="total">0,00 €</div>
    <div class="yearly" id="yearlyTotal">0,00 € al año</div>
  </div>

  <div class="grid">
    <div class="mini glass">
      <span>Próximos 7 días</span>
      <strong id="weekTotal">0,00 €</strong>
    </div>
    <div class="mini glass saving">
      <span>Ahorro potencial</span>
      <strong id="savingTotal">0,00 €</strong>
    </div>
  </div>
</section>

<section class="aiBox glass" id="ia">
  <textarea id="aiInput" placeholder="Ej: Spotify 11.99 mensual renovación 9/5&#10;ChatGPT 20 USD mensual renueva el 15 de mayo&#10;Canva 120 anual"></textarea>
  <button class="primary" id="aiBtn">✨ Cargar con IA</button>
</section>

<section class="manual glass" id="manualPanel">
  <input id="mName" placeholder="Nombre">
  <input id="mPrice" type="number" step="0.01" placeholder="Precio">
  <input id="mDate" type="date">
  <select id="mFrequency">
    <option value="monthly">Mensual</option>
    <option value="yearly">Anual</option>
    <option value="trial">Trial</option>
  </select>
  <select id="mUsage">
    <option value="alta">Uso alto</option>
    <option value="media">Uso medio</option>
    <option value="baja">Uso bajo</option>
  </select>
  <button class="primary" id="manualBtn">Guardar</button>
</section>
<div class="quickAdd">
  <h2>Descubrí en qué se te va la plata</h2>
  <p style="opacity:.7">Elegí lo que usás</p>

  <div class="quickGrid">
    <button onclick="quickAdd('Spotify')">Spotify</button>
    <button onclick="quickAdd('Netflix')">Netflix</button>
    <button onclick="quickAdd('ChatGPT')">ChatGPT</button>
    <button onclick="quickAdd('Canva')">Canva</button>

    <button onclick="quickAdd('Disney+')">Disney+</button>
    <button onclick="quickAdd('YouTube')">YouTube</button>
    <button onclick="quickAdd('iCloud')">iCloud</button>
    <button onclick="quickAdd('Google Drive')">Drive</button>

    <button onclick="quickAdd('Amazon Prime')">Prime</button>
    <button onclick="quickAdd('HBO Max')">HBO</button>
    <button onclick="quickAdd('Suno')">Suno</button>
    <button onclick="quickAdd('Moises')">Moises</button>
  </div>
</div>
<div class="quick">
  <button id="mailBtn">🔍 Correo</button>
  <button id="smsBtn">📱 SMS</button>
</div>
  
<button class="primary" id="notifyBtn">🔔 Activar notificaciones</button>
  
</div>
<button class="primary" id="upcomingBtn">🔔 Ver próximos cobros</button>

<section class="rankBox glass" id="rankBox">
  <div class="section" style="margin-top:0">
    <h2 style="font-size:24px">Resumen inteligente</h2>
  </div>
  <div id="rankList"></div>
</section>

<section class="advisor glass" id="advisor">
  <div class="section" style="margin-top:0">
    <h2 style="font-size:24px">Preguntale a SubAlert</h2>
  </div>
  <input class="search" id="advisorInput" placeholder="Ej: ¿Qué debería cancelar?">
  <button class="primary" id="advisorBtn">🤖 Analizar mis gastos</button>
  <div class="answerBox" id="answerBox"></div>
</section>

<input class="search" id="search" placeholder="Buscar suscripción...">

<div class="section" id="listSection">
  <h2>Suscripciones</h2>
  <span id="count">0 activas</span>
</div>

<div id="list"></div>

</div>

<nav class="nav">
  <button data-nav="home">Inicio</button>
  <button data-nav="ia">IA</button>
  <button id="navAdd">Agregar</button>
  <button data-nav="listSection">Lista</button>
</nav>

<script>
let subs = JSON.parse(localStorage.getItem("subs") || "[]");
let editingId = null;

const $ = id => document.getElementById(id);

const EXCHANGE = { EUR:1, USD:0.93 };

function toEUR(amount, currency="EUR"){
  return Number(amount || 0) * (EXCHANGE[currency] || 1);
}

const brandMap = {
  spotify:"Spotify",
  netflix:"Netflix",
  chatgpt:"ChatGPT",
  openai:"OpenAI",
  canva:"Canva",
  disney:"Disney+",
  disneyplus:"Disney+",
  amazon:"Amazon",
  prime:"Amazon Prime",
  suno:"Suno",
  moises:"Moises",
  afa:"AFA Play",
  youtube:"YouTube",
  google:"Google"
};

const categories = {
  music:["spotify","youtube music","apple music","deezer","tidal"],
  video:["netflix","disney","prime","amazon prime","hbo","max","skyshowtime"],
  ai:["chatgpt","openai","suno"],
  design:["canva","adobe"],
  audio:["moises","suno"],
  cloud:["google","icloud","dropbox"]
};

const monthMap = {
  enero:1, febrero:2, marzo:3, abril:4, mayo:5, junio:6,
  julio:7, agosto:8, septiembre:9, setiembre:9, octubre:10,
  noviembre:11, diciembre:12
};

const numberWords = {
  "uno":1,"una":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7,
  "ocho":8,"nueve":9,"diez":10,"once":11,"doce":12,"trece":13,"catorce":14,
  "quince":15,"dieciseis":16,"dieciséis":16,"diecisiete":17,"dieciocho":18,
  "diecinueve":19,"veinte":20,"veintiuno":21,"veintidos":22,"veintidós":22,
  "veintitres":23,"veintitrés":23,"veinticuatro":24,"veinticinco":25,
  "veintiseis":26,"veintiséis":26,"veintisiete":27,"veintiocho":28,
  "veintinueve":29,"treinta":30,"treinta y uno":31
};

function save(){ localStorage.setItem("subs", JSON.stringify(subs)); }

function normalizeText(text){
  return String(text || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function money(n, currency="EUR"){
  const symbol = currency === "USD" ? "$" : "€";
  return Number(n || 0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2}) + " " + symbol;
}

function moneyEUR(n){
  return Number(n || 0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2}) + " €";
}

function monthlyCost(s){
  const price = Number(s.price || 0);
  if(s.frequency === "yearly") return price / 12;
  return price;
}

function monthlyEUR(s){
  return toEUR(monthlyCost(s), s.currency || "EUR");
}

function displayMonthlyCost(s){
  const base = money(monthlyCost(s), s.currency || "EUR");
  if((s.currency || "EUR") !== "EUR"){
    return `${base} (~${moneyEUR(monthlyEUR(s))})`;
  }
  return base;
}

function daysUntil(date){
  if(!date) return null;
  const today = new Date();
  const target = new Date(date + "T00:00:00");
  today.setHours(0,0,0,0);
  return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

function formatDate(date){
  if(!date) return "";
  return new Date(date + "T00:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short"});
}

function makeDate(day, month){
  const today = new Date();
  let year = today.getFullYear();
  const candidate = new Date(year, month - 1, day);
  const cleanToday = new Date();
  cleanToday.setHours(0,0,0,0);
  if(candidate < cleanToday) year++;
  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

function parseDate(text){
  const lower = normalizeText(text);
  let m = lower.match(/(\d{1,2})[\/\-](\d{1,2})/);
  if(m) return makeDate(Number(m[1]), Number(m[2]));

  m = lower.match(/(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/);
  if(m) return makeDate(Number(m[1]), monthMap[m[2]]);

  for(const word in numberWords){
    for(const month in monthMap){
      if(lower.includes(`${word} de ${month}`)){
        return makeDate(numberWords[word], monthMap[month]);
      }
    }
  }
  return "";
}

function parseCurrency(text){
  const lower = normalizeText(text);
  if(lower.includes("usd") || lower.includes("dolar") || lower.includes("$")) return "USD";
  return "EUR";
}

function parseFrequency(text){
  const lower = normalizeText(text);
  if(lower.includes("anual") || lower.includes("año") || lower.includes("year")) return "yearly";
  if(lower.includes("trial") || lower.includes("prueba")) return "trial";
  return "monthly";
}

function normalizeBrand(name){
  const key = normalizeText(name).replace(/\s+/g,"");
  return brandMap[key] || name;
}

function detectUsage(name){
  const n = normalizeText(name);
  if(n.includes("spotify") || n.includes("netflix") || n.includes("disney")) return "alta";
  if(n.includes("chatgpt") || n.includes("canva") || n.includes("suno") || n.includes("moises")) return "media";
  return "baja";
}

function getCategory(name){
  const n = normalizeText(name);
  for(const cat in categories){
    if(categories[cat].some(item => n.includes(item))) return cat;
  }
  return "other";
}

function cleanName(text){
  let name = normalizeText(text);
  name = name
    .replace(/\d+([.,]\d+)?/g,"")
    .replace(/\d{1,2}[\/\-]\d{1,2}/g,"")
    .replace(/\d{1,2}\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/gi,"")
    .replace(/mensual|mes|anual|año|yearly|monthly|trial|prueba/gi,"")
    .replace(/usd|eur|euro|euros|dolar|dolares|\$|€/gi,"")
    .replace(/renovacion|renueva|renueva el|fecha|cobro|proximo|próximo/gi,"");

  Object.keys(monthMap).forEach(month=>{
    name = name.replace(new RegExp(month,"gi"),"");
  });

  Object.keys(numberWords).forEach(word=>{
    name = name.replace(new RegExp("\\b"+word+"\\b","gi"),"");
  });

  name = name
    .replace(/\bde\b|\bel\b|\bla\b|\blos\b|\blas\b|\by\b/gi,"")
    .replace(/[^\w\s]/gi,"")
    .replace(/\s+/g," ")
    .trim()
    .replace(/\b\w/g,c=>c.toUpperCase());

  return normalizeBrand(name);
}

function duplicateExists(name, ignoreId=null){
  const n = normalizeText(name);
  return subs.some(s => {
    if(ignoreId && s.id === ignoreId) return false;
    const existing = normalizeText(s.name);
    return existing.includes(n) || n.includes(existing);
  });
}

function score(s){
  let n = 0;
  if(s.usage === "baja") n += 5;
  if(s.usage === "media") n += 2;
  if(monthlyEUR(s) > 10) n += 2;
  if(monthlyEUR(s) > 20) n += 3;
  if(s.frequency === "yearly") n += 1;
  if(!s.date) n += 1;

  const cat = getCategory(s.name);
  const sameCategory = subs.filter(x => getCategory(x.name) === cat && cat !== "other");
  if(sameCategory.length > 1) n += 1;

  return Math.min(n,10);
}

function label(n){
  if(n >= 7) return ["danger","🔴 Cancelar pronto"];
  if(n >= 4) return ["warn","🟡 Revisar"];
  return ["ok","🟢 Mantener"];
}

function explainSub(s){
  const reasons = [];
  const m = monthlyEUR(s);
  const cat = getCategory(s.name);
  const sameCategory = subs.filter(x => getCategory(x.name) === cat && cat !== "other");

  if(s.usage === "alta") reasons.push("La marcaste como uso alto, por eso no parece una cancelación urgente.");
  if(s.usage === "media") reasons.push("Tiene uso medio: conviene revisar si realmente la aprovechás.");
  if(s.usage === "baja") reasons.push("Tiene uso bajo: es candidata fuerte a cancelación.");

  if(m > 20) reasons.push("Tiene un coste mensual alto.");
  else if(m > 10) reasons.push("Tiene un coste mensual medio/alto.");
  else reasons.push("Su coste mensual no es especialmente alto.");

  if(s.frequency === "yearly") reasons.push("Es anual: puede doler menos mes a mes, pero suma en el año.");
  if(!s.date) reasons.push("No tiene fecha de renovación cargada, así que hay menos control.");
  if(sameCategory.length > 1) reasons.push("Puede solaparse parcialmente con otra herramienta de la misma familia.");

  return reasons;
}

function renewalText(s){
  const d = daysUntil(s.date);
  if(d === null) return "Sin fecha de renovación";
  if(d === 0) return "Hoy te cobran";
  if(d > 0) return `En ${d} días · ${formatDate(s.date)}`;
  return "Fecha pasada";
}

function splitEntries(raw){
  return raw.split(/\n|;|,(?=\s*[A-Za-zÁÉÍÓÚáéíóúÑñ])/).map(x=>x.trim()).filter(Boolean);
}

function parseAI(){
  const raw = $("aiInput").value.trim();
  if(!raw) return showAnswer("Escribí una suscripción primero.");

  const parts = splitEntries(raw);
  let added = 0;

  parts.forEach(line=>{
    const priceMatch = line.match(/\d+([.,]\d+)?/);
    if(!priceMatch) return;

    const price = Number(priceMatch[0].replace(",","."));
    const name = cleanName(line);
    const date = parseDate(line);
    const currency = parseCurrency(line);
    const frequency = parseFrequency(line);
    const usage = detectUsage(name);

    if(!name || !price) return;
    if(duplicateExists(name)) return;

    subs.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
      name, price, currency, frequency, date, usage, source:"IA"
    });

    added++;
  });

  $("aiInput").value = "";
  save();
  render();

  showAnswer(added ? `Cargué ${added} suscripción/es.` : "No encontré suscripciones nuevas o ya estaban cargadas.");
}

function addManual(){
  const name = normalizeBrand($("mName").value.trim());
  const price = Number($("mPrice").value);
  const date = $("mDate").value;
  const usage = $("mUsage").value;
  const frequency = $("mFrequency").value;

  if(!name) return showAnswer("Falta el nombre.");
  if(!price) return showAnswer("Falta el precio.");

  if(editingId){
    subs = subs.map(s => s.id === editingId ? {...s, name, price, date, usage, frequency, currency:s.currency || "EUR"} : s);
    editingId = null;
  } else {
    if(duplicateExists(name)) return showAnswer("Ya existe una suscripción parecida.");
    subs.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
      name, price, date, usage, frequency, currency:"EUR", source:"Manual"
    });
  }

  clearManual();
  $("manualPanel").style.display = "none";
  save();
  render();
}

function clearManual(){
  $("mName").value = "";
  $("mPrice").value = "";
  $("mDate").value = "";
  $("mUsage").value = "media";
  $("mFrequency").value = "monthly";
}

function editSub(id){
  const s = subs.find(x => x.id === id);
  if(!s) return;

  editingId = id;
  $("mName").value = s.name;
  $("mPrice").value = s.price;
  $("mDate").value = s.date || "";
  $("mUsage").value = s.usage || "media";
  $("mFrequency").value = s.frequency || "monthly";
  $("manualPanel").style.display = "block";
  $("manualPanel").scrollIntoView({behavior:"smooth", block:"center"});
}

function getInsights(){
  const total = subs.reduce((a,s)=>a + monthlyEUR(s), 0);
  const yearly = total * 12;

  const topExpenses = [...subs].sort((a,b)=>monthlyEUR(b) - monthlyEUR(a)).slice(0,3);
  const cancelCandidates = [...subs].sort((a,b)=>score(b) - score(a)).slice(0,3);

  const duplicateCategories = [];
  Object.keys(categories).forEach(cat=>{
    const group = subs.filter(s => getCategory(s.name) === cat);
    if(group.length > 1) duplicateCategories.push({cat, group});
  });

  return {total, yearly, topExpenses, cancelCandidates, duplicateCategories};
}

function renderRankings(){
  const insights = getInsights();
  let html = "";

  if(insights.topExpenses.length){
    html += `<div class="details"><b>Top gastos:</b></div>`;
    insights.topExpenses.forEach(s=>{
      html += `<div class="rankItem"><strong>${escapeHTML(s.name)}</strong><span>${displayMonthlyCost(s)}/mes</span></div>`;
    });
  }

  if(insights.cancelCandidates.length){
    html += `<div class="details" style="margin-top:14px"><b>Prioridad de revisión:</b></div>`;
    insights.cancelCandidates.forEach(s=>{
      html += `<div class="rankItem"><strong>${escapeHTML(s.name)}</strong><span>Score ${score(s)}/10</span></div>`;
    });
  }

  if(insights.duplicateCategories.length){
    html += `<div class="details" style="margin-top:14px"><b>Posibles solapamientos:</b></div>`;
    insights.duplicateCategories.forEach(item=>{
      html += `<div class="insight">Tenés varias herramientas de ${item.cat}: ${item.group.map(x=>x.name).join(", ")}. Pueden solaparse parcialmente, pero no necesariamente reemplazarse.</div>`;
    });
  }

  $("rankList").innerHTML = html || `<div class="details">Agregá suscripciones para ver recomendaciones.</div>`;
}

function showAnswer(text){
  const box = $("answerBox");
  box.style.display = "block";
  box.textContent = text;
  box.scrollIntoView({behavior:"smooth", block:"center"});
}

function askAdvisor(){
  if(!subs.length) return showAnswer("Todavía no hay suscripciones para analizar.");

  const question = normalizeText($("advisorInput").value);
  const insights = getInsights();
  const reviewList = insights.cancelCandidates.filter(s => score(s) >= 4);
  const urgentList = insights.cancelCandidates.filter(s => score(s) >= 7);
  const top = insights.topExpenses[0];
  const worst = reviewList[0] || insights.cancelCandidates[0];

  let msg = `Gastás aproximadamente ${moneyEUR(insights.total)} al mes (${moneyEUR(insights.yearly)} al año).\n\n`;

  if(question.includes("cancel") || question.includes("eliminar") || question.includes("quitar")){
    if(urgentList.length){
      const s = urgentList[0];
      msg += `La primera candidata a cancelar sería ${s.name}.\nScore: ${score(s)}/10.\n\n`;
      msg += explainSub(s).map(r=>`• ${r}`).join("\n");
      msg += `\n\nAhorro estimado: ${moneyEUR(monthlyEUR(s))} al mes.`;
    } else if(reviewList.length){
      const s = reviewList[0];
      msg += `No veo una cancelación urgente, pero revisaría primero ${s.name}.\nScore: ${score(s)}/10.\n\n`;
      msg += explainSub(s).map(r=>`• ${r}`).join("\n");
      msg += `\n\nAhorro posible: ${moneyEUR(monthlyEUR(s))} al mes.`;
    } else {
      msg += "No veo ninguna suscripción claramente cancelable ahora mismo.";
    }
  } else if(question.includes("car") || question.includes("gasto")){
    msg += `Tu mayor gasto es ${top.name}: ${displayMonthlyCost(top)} al mes.\n\n`;
    msg += explainSub(top).map(r=>`• ${r}`).join("\n");
  } else if(question.includes("ahorrar")){
    const options = reviewList;
    const possible = options.reduce((a,s)=>a + monthlyEUR(s), 0);
    msg += `Podrías revisar ${options.length} suscripción/es y liberar aproximadamente ${moneyEUR(possible)} al mes.\n\n`;
    msg += options.map(s=>`• ${s.name}: ${displayMonthlyCost(s)}/mes · Score ${score(s)}/10`).join("\n");
  } else if(question.includes("repet") || question.includes("solap") || question.includes("duplic")){
    if(insights.duplicateCategories.length){
      const dup = insights.duplicateCategories[0];
      msg += `Detecté posible solapamiento en ${dup.cat}: ${dup.group.map(x=>x.name).join(", ")}.\n\n`;
      msg += "Pueden compartir parte del uso, pero no necesariamente reemplazarse. Conviene comparar qué función cumple cada una.";
    } else {
      msg += "No veo suscripciones claramente repetidas.";
    }
  } else {
    if(worst){
      msg += `La revisión más razonable sería ${worst.name}: score ${score(worst)}/10.\n\n`;
      msg += explainSub(worst).map(r=>`• ${r}`).join("\n");
    } else {
      msg += "No veo una cancelación urgente. Revisaría las que tengan uso bajo, coste alto o fecha de renovación cercana.";
    }
  }

  showAnswer(msg);
}
function quickAdd(name){
  const map = {
    "Spotify": { price: 11.99, frequency: "monthly", currency: "EUR", usage: "alta" },
    "Netflix": { price: 12.99, frequency: "monthly", currency: "EUR", usage: "media" },
    "ChatGPT": { price: 20, frequency: "monthly", currency: "USD", usage: "media" },
    "Canva": { price: 120, frequency: "yearly", currency: "EUR", usage: "media" },
    "Disney+": { price: 8.99, frequency: "monthly", currency: "EUR", usage: "media" },
    "YouTube": { price: 11.99, frequency: "monthly", currency: "EUR", usage: "media" },
    "iCloud": { price: 0.99, frequency: "monthly", currency: "EUR", usage: "alta" },
    "Google Drive": { price: 1.99, frequency: "monthly", currency: "EUR", usage: "media" },
    "Amazon Prime": { price: 4.99, frequency: "monthly", currency: "EUR", usage: "media" },
    "HBO Max": { price: 9.99, frequency: "monthly", currency: "EUR", usage: "media" },
    "Suno": { price: 10, frequency: "monthly", currency: "USD", usage: "media" },
    "Moises": { price: 5.99, frequency: "monthly", currency: "EUR", usage: "media" }
  };

  const data = map[name];
  if(!data) return;

  if(duplicateExists(name)){
    showAnswer(`${name} ya está cargada.`);
    return;
  }

  const date = new Date();
  date.setDate(date.getDate() + (data.frequency === "yearly" ? 365 : 30));

  subs.unshift({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
    name,
    price: data.price,
    currency: data.currency,
    frequency: data.frequency,
    date: date.toISOString().split("T")[0],
    usage: data.usage,
    source: "Rápido"
  });

  save();
  render();

  const total = subs.reduce((a,s)=>a + monthlyEUR(s), 0);
  showAnswer(`Agregué ${name}.\n\nAhora estás registrando aproximadamente ${moneyEUR(total)} al mes en suscripciones.`);
}
function render(){
  const search = $("search").value.toLowerCase();
  const filtered = subs.filter(s => s.name.toLowerCase().includes(search));

  const total = subs.reduce((a,s)=>a + monthlyEUR(s), 0);
  const week = subs.filter(s=>{
    const d = daysUntil(s.date);
    return d !== null && d >= 0 && d <= 7;
  }).reduce((a,s)=>a + monthlyEUR(s), 0);

  const saving = subs.filter(s=>score(s) >= 4).reduce((a,s)=>a + monthlyEUR(s), 0);

  $("total").innerText = moneyEUR(total);
  $("yearlyTotal").innerText = `${moneyEUR(total * 12)} al año`;
  $("weekTotal").innerText = moneyEUR(week);
  $("savingTotal").innerText = moneyEUR(saving);
  $("count").innerText = `${subs.length} activas`;

  renderRankings();

  if(!filtered.length){
    $("list").innerHTML = `<div class="empty glass">No hay suscripciones cargadas.</div>`;
    return;
  }

  $("list").innerHTML = filtered.map(s=>{
    const sc = score(s);
    const [cls,txt] = label(sc);
    const freqLabel = s.frequency === "yearly" ? "Anual" : s.frequency === "trial" ? "Trial" : "Mensual";
    const pricePeriod = s.frequency === "yearly" ? "/ año" : s.frequency === "trial" ? "/ trial" : "/ mes";
    const reasons = explainSub(s).slice(0,2).map(r=>`<div>• ${escapeHTML(r)}</div>`).join("");

    return `
      <article class="card glass">
        <div class="cardHead">
          <div>
            <div class="name">${escapeHTML(s.name)}</div>
            <div class="source">${escapeHTML(s.source || "Manual")}</div>
          </div>
          <div class="price">${money(s.price, s.currency)}<small>${pricePeriod}</small></div>
        </div>
        <div class="status ${cls}">${txt}</div>
        <div class="meta">
          <span class="pill">${freqLabel}</span>
          <span class="pill">Uso: ${s.usage}</span>
        </div>
        <div class="renewal">🔔 ${renewalText(s)}</div>
        <div class="details">
          <div><b>Coste mensual real:</b> ${displayMonthlyCost(s)}</div>
          <div><b>Score:</b> ${sc}/10</div>
          <div style="margin-top:8px">${reasons}</div>
        </div>
        <div class="actions">
          <button class="action delete" data-action="delete" data-id="${s.id}">Eliminar</button>
          <button class="action review" data-action="review" data-id="${s.id}">Revisar</button>
          <button class="action keep" data-action="keep" data-id="${s.id}">Mantener</button>
          <button class="action edit" data-action="edit" data-id="${s.id}">Editar</button>
        </div>
      </article>`;
  }).join("");
}

function escapeHTML(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function showUpcoming(){
  const upcoming = subs.filter(s=>{
    const d = daysUntil(s.date);
    return d !== null && d >= 0 && d <= 30;
  }).map(s=>`• ${s.name}: ${renewalText(s)}`).join("\n");

  showAnswer(upcoming ? "Próximos cobros:\n\n" + upcoming : "No tenés cobros próximos cargados.");
}

function toggleManual(){
  const box = $("manualPanel");
  box.style.display = box.style.display === "block" ? "none" : "block";
  if(box.style.display === "block"){
    box.scrollIntoView({behavior:"smooth", block:"center"});
  }
}
async function activateNotifications(){
  const isStandalone =
    window.navigator.standalone === true ||
    window.matchMedia("(display-mode: standalone)").matches;

  if(!isStandalone){
    showAnswer("Abrí SubAlert desde el icono instalado en la pantalla de inicio para activar notificaciones.");
    return;
  }

  if(!("Notification" in window)){
    showAnswer("Este dispositivo no soporta notificaciones web.");
    return;
  }

  const permission = await Notification.requestPermission();

  if(permission !== "granted"){
    showAnswer("No se activaron las notificaciones. Revisá los permisos del iPhone.");
    return;
  }

  const reg = await navigator.serviceWorker.ready;

  reg.showNotification("SubAlert activado 🔔", {
    body: "Las notificaciones ya están listas.",
    icon: "/icon-192.png",
    badge: "/icon-192.png"
  });

  showAnswer("Notificaciones activadas correctamente.");
}

$("plusBtn").addEventListener("click", toggleManual);
$("navAdd").addEventListener("click", toggleManual);
$("manualBtn").addEventListener("click", addManual);
  $("notifyBtn").addEventListener("click", activateNotifications);
$("upcomingBtn").addEventListener("click", showUpcoming);
$("advisorBtn").addEventListener("click", askAdvisor);
$("mailBtn").addEventListener("click", ()=>showAnswer("Correo conectado en próxima versión."));
$("smsBtn").addEventListener("click", ()=>showAnswer("SMS en prueba."));
$("search").addEventListener("input", render);

document.querySelectorAll("[data-nav]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    $(btn.dataset.nav).scrollIntoView({behavior:"smooth"});
  });
});

$("list").addEventListener("click", e=>{
  const btn = e.target.closest("button[data-action]");
  if(!btn) return;

  const id = btn.dataset.id;
  const action = btn.dataset.action;

  if(action === "delete") subs = subs.filter(s=>s.id !== id);
  if(action === "review") subs = subs.map(s=>s.id === id ? {...s, usage:"baja"} : s);
  if(action === "keep") subs = subs.map(s=>s.id === id ? {...s, usage:"alta"} : s);
  if(action === "edit") return editSub(id);

  save();
  render();
});
function checkAlerts(){
  const today = new Date();
  const alerts = [];

  subs.forEach(sub => {
    if(!sub.date) return;

    const renewalDate = new Date(sub.date + "T00:00:00");
    const diffTime = renewalDate - today;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    if(diffDays === 0){
      alerts.push(`⚠️ Hoy se cobra ${sub.name}`);
    } else if(diffDays === 1){
      alerts.push(`⏳ Mañana se cobra ${sub.name}`);
    } else if(diffDays > 1 && diffDays <= 3){
      alerts.push(`📅 En ${diffDays} días se cobra ${sub.name}`);
    }
  });

  if(alerts.length){
    showAnswer("Alertas próximas:\n\n" + alerts.join("\n"));
  }
}
try{
  render();
  checkAlerts();
}catch(e){
  document.body.innerHTML = "<pre style='color:red'>" + e + "</pre>";
}
 if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker registrado"))
    .catch(err => console.error("Error SW:", err));
}
