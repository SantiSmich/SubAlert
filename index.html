<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubAlert</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

h1 {font-size:28px;}

.summary {
  margin:15px 0;
}

.total {
  font-size:24px;
  font-weight:bold;
}

.alert {
  color:#ff5c6c;
  margin-top:5px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#7c3aed;
  color:white;
  margin-top:10px;
}

.card {
  background:#1c1c1c;
  padding:12px;
  border-radius:12px;
  margin:10px 0;
  border-left:5px solid #35d07f;
}

.card.danger {border-left:5px solid #ff5c6c;}
.card.warning {border-left:5px solid #f7c948;}

.small {
  font-size:12px;
  color:#aaa;
}

.row {
  display:flex;
  gap:5px;
  margin-top:10px;
}

.row button {
  flex:1;
  font-size:12px;
}

.modal {
  display:none;
  background:#222;
  padding:15px;
  border-radius:10px;
}

input,select {
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  border:none;
}
</style>

</head>

<body>

<h1>SubAlert</h1>
<p>Nunca más una suscripción sorpresa</p>

<div class="summary">
  <div class="total" id="total">0 €</div>
  <div class="alert" id="week"></div>
</div>

<button onclick="openModal()">+ Agregar</button> <button onclick="demo()">Demo</button>

<div id="list"></div>

<div class="modal" id="modal">
  <input id="id" hidden>
  <input id="name" placeholder="Servicio">
  <input id="price" type="number" placeholder="Precio">
  <input id="date" type="date">
  <input id="url" placeholder="Link cancelar">
  <button onclick="save()">Guardar</button>
</div>

<script>
let subs = JSON.parse(localStorage.getItem("subs")) || [];

function render(){
  let html="";
  let total=0;
  let week=0;

  subs.forEach(s=>{
    total+=s.price;
    let d=days(s.date);

    if(d<=7) week+=s.price;

    let status=getStatus(d,s.price);

    html+=`
    <div class="card ${status.class}">
      <b>${s.name}</b> - ${s.price}€
      <div>${status.text}</div>
      <div class="small">${s.date}</div>

      <div class="row">
        <button onclick="edit('${s.id}')">Editar</button>
        <button onclick="cancel('${s.name}')">Cancelar</button>
        <button onclick="del('${s.id}')">X</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText=total+"€";
  document.getElementById("week").innerText="Esta semana: "+week+"€";
}

function openModal(){
  document.getElementById("modal").style.display="block";
}

function save(){
  let id=document.getElementById("id").value;

  let obj={
    id:id||Date.now(),
    name:name.value,
    price:parseFloat(price.value),
    date:date.value,
    url:url.value
  };

  if(id){
    subs=subs.map(s=>s.id==id?obj:s);
  }else{
    subs.push(obj);
  }

  localStorage.setItem("subs",JSON.stringify(subs));
  render();
  modal.style.display="none";
}

function edit(id){
  let s=subs.find(x=>x.id==id);
  document.getElementById("id").value=s.id;
  name.value=s.name;
  price.value=s.price;
  date.value=s.date;
}

function del(id){
  subs=subs.filter(s=>s.id!=id);
  localStorage.setItem("subs",JSON.stringify(subs));
  render();
}

function cancel(name){
  window.open("https://google.com/search?q=cancelar+"+name);
}

function getStatus(d,p){
  if(d<=0) return {class:"danger",text:"🚨 Hoy te cobran "+p+"€"};
  if(d==1) return {class:"danger",text:"🚨 Mañana "+p+"€"};
  if(d<=3) return {class:"danger",text:"⚠️ "+d+" días "+p+"€"};
  if(d<=7) return {class:"warning",text:"En "+d+" días"};
  return {class:"",text:"En "+d+" días"};
}

function days(date){
  return Math.ceil((new Date(date)-new Date())/86400000);
}

function demo(){
  subs.push({id:Date.now(),name:"Netflix",price:12,date:future(2)});
  subs.push({id:Date.now()+1,name:"Spotify",price:10,date:future(5)});
  localStorage.setItem("subs",JSON.stringify(subs));
  render();
}

function future(d){
  let t=new Date();t.setDate(t.getDate()+d);
  return t.toISOString().slice(0,10);
}

render();
</script>

</body>
</html>
