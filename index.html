<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubAlert</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at 20% 20%,#4c1d95,#0f0320);
  color:white;
  padding:20px 16px 120px;
  overflow-x:hidden;
}

/* FONDO ANIMADO */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#9333ea,#4c1d95,#1e1b4b);
  animation:bgMove 12s linear infinite;
  opacity:0.2;
  z-index:-1;
}
@keyframes bgMove{
  0%{transform:translate(0,0)}
  100%{transform:translate(-50%,-50%)}
}

.app{max-width:520px;margin:auto}

/* HEADER */
h1{font-size:30px;margin:10px 0}
p{color:#d8ccff}

/* HERO */
.hero{
  padding:20px;
  border-radius:26px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  margin-top:20px;
  transform:perspective(800px) rotateX(2deg);
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0) rotateX(2deg)}
  50%{transform:translateY(-6px) rotateX(2deg)}
}

/* NÚMERO GRANDE */
.big{
  font-size:42px;
  font-weight:900;
  margin:10px 0;
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{opacity:0.8}
  50%{opacity:1}
  100%{opacity:0.8}
}

/* CTA */
.cta{
  margin-top:15px;
  padding:14px;
  border-radius:16px;
  border:none;
  width:100%;
  font-weight:900;
  font-size:16px;
  background:linear-gradient(90deg,#a855f7,#6366f1);
  color:white;
  box-shadow:0 10px 25px rgba(168,85,247,0.6);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px rgba(168,85,247,0.4)}
  to{box-shadow:0 0 25px rgba(168,85,247,1)}
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.card{
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  transition:.3s;
}

.card:hover{
  transform:scale(1.03);
}

/* LIVE */
.liveNumber{
  font-size:32px;
  font-weight:900;
}

/* NAV */
.nav{
  position:fixed;
  bottom:15px;
  left:15px;
  right:15px;
  max-width:520px;
  margin:auto;
  background:#0b061a;
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  padding:12px;
  border:1px solid rgba(255,255,255,0.1);
}

.nav button{
  background:none;
  border:none;
  color:#aaa;
  font-weight:800;
}
.nav button.active{color:white}
</style>
</head>

<body>

<div class="app">

<h1>SubAlert</h1>
<p id="subtitle">Detectá. Decidí. Ahorrá.</p>

<!-- HERO DINÁMICO -->
<div class="hero">

<h2 id="heroTitle"></h2>

<div class="big" id="heroAmount"></div>

<p id="heroDesc"></p>

<button class="cta" id="ctaBtn"></button>

</div>

<!-- MINI CARDS -->
<div class="grid">
  <div class="card">
    <p>Próximo cobro</p>
    <strong id="nextCharge">—</strong>
  </div>

  <div class="card">
    <p>Ahorro detectado</p>
    <strong id="saving">0 €</strong>
  </div>
</div>

<!-- LIVE -->
<div class="hero" style="margin-top:16px">
  <h2>💸 Contador vivo</h2>
  <div class="liveNumber" id="liveMoney">0 €</div>
  <p id="liveDetail">calculando...</p>
</div>

</div>

<nav class="nav">
  <button class="active">Inicio</button>
  <button>Live</button>
  <button>Lista</button>
  <button>IA</button>
</nav>

<script>

/* DATA */
let subs = [
  {name:"Netflix",price:6.99},
  {name:"Spotify",price:11.99}
];

/* HELPERS */
function totalMonthly(){
  return subs.reduce((a,s)=>a+s.price,0);
}

/* HERO DINÁMICO */
function renderHero(){

  if(subs.length === 0){

    document.getElementById("heroTitle").textContent =
      "Descubrí cuánto dinero se te va";

    document.getElementById("heroAmount").textContent =
      "";

    document.getElementById("heroDesc").textContent =
      "Pegá tus gastos y detectamos qué cancelar";

    document.getElementById("ctaBtn").textContent =
      "Detectar mis suscripciones";

  } else {

    const total = totalMonthly();

    document.getElementById("heroTitle").textContent =
      "Esto es lo que estás perdiendo";

    document.getElementById("heroAmount").textContent =
      total.toFixed(2) + " €";

    document.getElementById("heroDesc").textContent =
      "Cada mes sin darte cuenta";

    document.getElementById("ctaBtn").textContent =
      "Decime qué cancelar";
  }
}

/* LIVE COUNTER */
let live = 0;

function startLive(){
  const monthly = totalMonthly();
  const perSecond = monthly / 2592000;

  setInterval(()=>{
    live += perSecond;
    document.getElementById("liveMoney").textContent =
      live.toFixed(2) + " €";
  },1000);
}

/* INIT */
renderHero();
startLive();

</script>

</body>
</html>
