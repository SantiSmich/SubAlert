<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubAlert</title>

<style>
:root{
  --bg:#101018;
  --card:#1b1b27;
  --card2:#242435;
  --text:#f7f4ff;
  --muted:#aaa6bd;
  --purple:#7c3aed;
  --purple2:#a78bfa;
  --red:#ff5c6c;
  --yellow:#f7c948;
  --green:#35d07f;
}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(#111,#09090d);
  color:white;
}

.app{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:34px;
  margin:0;
}

.subtitle{
  color:#aaa;
  margin-bottom:20px;
}

.summary{
  background:var(--card);
  padding:20px;
  border-radius:20px;
}

.total{
  font-size:28px;
  font-weight:bold;
}

.alertBox{
  margin-top:10px;
  color:#ff5c6c;
}

.card{
  background:var(--card);
  margin-top:10px;
  padding:15px;
  border-radius:15px;
  border-left:5px solid var(--green);
}

.card.danger{border-left:5px solid var(--red)}
.card.warning{border-left:5px solid var(--yellow)}

.btnRow{
  display:flex;
  gap:5px;
  margin-top:10px;
}

button{
  padding:8px;
  border:none;
  border-radius:10px;
  background:var(--purple);
  color:white;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="app">

<h1>SubAlert</h1>
<p class="subtitle">Nunca más una suscripción sorpresa</p>

<div class="summary">
  <div class="total" id="total">0 €</div>
  <div class="alertBox" id="alert"></div>
</div>

<button onclick="openModal()">+ Agregar</button>
<button onclick="demo()">Demo</button>

<div id="list"></div>

</div>

<div id="modal" style="display:none;padding:20px;">
  <input id="name" placeholder="Servicio">
  <input id="price" type="number" placeholder="Precio">
  <input id="date" type="date">
  <button onclick="save()">Guardar</button>
</div>

<script>
let subs = JSON.parse(localStorage.getItem("subs")) || [];

function render(){
  let html="";
  let total=0;
  let week=0;

  subs.forEach(s=>{
    total+=s.price;
    let d=days(s.date);
    if(d<=7) week+=s.price;

    let status=getStatus(d,s.price);

    html+=     <div class="card ${status.class}">       <b>${s.name}</b> - ${s.price}€       <div>${status.text}</div>        <div class="btnRow">         <button onclick="del('${s.id}')">Eliminar</button>       </div>     </div>;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText=total+"€";
  document.getElementById("alert").innerText="Esta semana: "+week+"€";
}

function openModal(){
  document.getElementById("modal").style.display="block";
}

function save(){
  subs.push({
    id:Date.now(),
    name:name.value,
    price:parseFloat(price.value),
    date:date.value
  });

  localStorage.setItem("subs",JSON.stringify(subs));
  render();
}

function del(id){
  subs=subs.filter(s=>s.id!=id);
  localStorage.setItem("subs",JSON.stringify(subs));
  render();
}

function getStatus(d,p){
  if(d<=0)return{class:"danger",text:"🚨 Hoy "+p+"€"};
  if(d==1)return{class:"danger",text:"🚨 Mañana "+p+"€"};
  if(d<=3)return{class:"danger",text:"⚠️ "+d+" días "+p+"€"};
  if(d<=7)return{class:"warning",text:"En "+d+" días"};
  return{class:"",text:"En "+d+" días"};
}

function days(date){
  return Math.ceil((new Date(date)-new Date())/86400000);
}

function demo(){
  subs.push({id:1,name:"Netflix",price:12,date:future(2)});
  subs.push({id:2,name:"Spotify",price:10,date:future(5)});
  localStorage.setItem("subs",JSON.stringify(subs));
  render();
}

function future(d){
  let t=new Date();
  t.setDate(t.getDate()+d);
  return t.toISOString().slice(0,10);
}

render();
</script>

</body>
</html>
