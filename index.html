<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubAlert</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, #32155f, #080711 55%);
      color: white;
      padding: 38px 22px;
    }
    .top { display: flex; justify-content: space-between; align-items: center; }
    .label { color: #b79cff; letter-spacing: 4px; font-weight: bold; font-size: 14px; }
    h1 { font-size: 54px; margin: 10px 0 8px; }
    .subtitle { color: #bfb6d8; font-size: 22px; margin-bottom: 28px; }
    .add {
      width: 72px; height: 72px; border-radius: 24px; border: 0;
      background: #7c35ff; color: white; font-size: 42px; font-weight: bold;
    }
    .summary {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 30px;
      padding: 26px;
      margin: 24px 0;
    }
    .summary p { color: #bfb6d8; font-size: 22px; margin: 0 0 12px; }
    .total { font-size: 48px; font-weight: bold; }
    .weekAlert {
      margin-top: 20px;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255, 90, 110, .25);
      color: #ffd7dc;
      font-weight: bold;
      display: none;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn, .reminder {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 22px;
      padding: 18px;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
      display: block;
    }
    .reminder {
      margin: 18px 0;
      background: linear-gradient(90deg, #8a3cff, #6723d4);
      border: 0;
    }
    input, select {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 18px;
      margin-bottom: 12px;
    }
    input::placeholder { color: #aaa; }
    .sectionTitle { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; }
    .sectionTitle h2 { font-size: 28px; margin: 0; }
    .count { color: #bfb6d8; font-size: 18px; }
    .empty {
      margin-top: 18px;
      padding: 28px;
      text-align: center;
      color: #bfb6d8;
      background: rgba(255,255,255,.07);
      border-radius: 28px;
    }
    .card {
      margin-top: 16px;
      padding: 22px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 26px;
    }
    .cardTop { display: flex; justify-content: space-between; gap: 14px; }
    .card h3 { margin: 0 0 8px; font-size: 24px; }
    .card p { color: #bfb6d8; margin: 5px 0; }
    .price { text-align: right; font-size: 22px; font-weight: bold; }
    .renewal { margin-top: 14px; color: #ffd7dc; font-weight: bold; }
    .details { margin-top: 12px; font-size: 14px; color: #bfb6d8; }
    .cardActions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .smallBtn {
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .cancelBtn { color: #ffb3c0; }
    .deleteBtn { color: #ff6b7a; }
  </style>
</head>

<body>
  <div class="top">
    <div>
      <div class="label">MEMORIA DIGITAL</div>
      <h1>SubAlert</h1>
      <div class="subtitle">Nunca más una suscripción sorpresa.</div>
    </div>
    <button class="add" onclick="openManual()">+</button>
  </div>

  <div class="summary">
    <p>Total mensual estimado</p>
    <div class="total" id="total">0,00 €</div>
    <div class="weekAlert" id="weekAlert"></div>
  </div>

  <div class="actions">
    <a class="btn" href="/api/auth/google">🔍 Buscar en correo</a>
    <button class="btn" onclick="demoSMS()">📱 Buscar por SMS</button>
  </div>

  <button class="reminder" onclick="activateReminders()">🔔 Activar recordatorios</button>

  <input id="search" placeholder="Buscar suscripción..." oninput="render()" />

  <div id="manualBox" style="display:none;">
    <input id="name" placeholder="Nombre: Netflix, Canva, ChatGPT..." />
    <input id="plan" placeholder="Plan: Premium, Pro, Plus..." />
    <input id="price" type="number" step="0.01" placeholder="Precio" />
    <select id="frequency">
      <option value="monthly">Mensual</option>
      <option value="yearly">Anual</option>
    </select>
    <input id="date" type="date" />
    <button class="reminder" onclick="addManual()">Guardar suscripción</button>
  </div>

  <div class="sectionTitle">
    <h2>Suscripciones</h2>
    <div class="count" id="count">0 activas</div>
  </div>

  <div id="list"></div>

  <script>
    const cancelLinks = {
      netflix: "https://www.netflix.com/cancelplan",
      spotify: "https://www.spotify.com/account/subscription/",
      chatgpt: "https://help.openai.com/en/articles/7232927-how-do-i-cancel-my-chatgpt-plus-subscription",
      openai: "https://help.openai.com/en/articles/7232927-how-do-i-cancel-my-chatgpt-plus-subscription",
      canva: "https://www.canva.com/settings/billing",
      amazon: "https://www.amazon.es/gp/primecentral",
      disney: "https://www.disneyplus.com/account",
      moises: "https://moises.ai/account",
      suno: "https://suno.com/account",
      youtube: "https://www.youtube.com/paid_memberships",
      google: "https://myaccount.google.com/payments-and-subscriptions",
      apple: "https://support.apple.com/billing"
    };

    let subs = JSON.parse(localStorage.getItem("subs") || "[]");

    function save() {
      localStorage.setItem("subs", JSON.stringify(subs));
    }

    function money(n) {
      return Number(n || 0).toLocaleString("es-ES", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + " €";
    }

    function monthlyCost(s) {
      const price = Number(s.price || 0);
      return s.frequency === "yearly" ? price / 12 : price;
    }

    function daysUntil(date) {
      if (!date) return null;
      const today = new Date();
      const target = new Date(date);
      today.setHours(0,0,0,0);
      target.setHours(0,0,0,0);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function getCancelUrl(name) {
      const text = (name || "").toLowerCase();
      for (const key in cancelLinks) {
        if (text.includes(key)) return cancelLinks[key];
      }
      return "";
    }

    function addDetected(item) {
      const exists = subs.some(s =>
        s.name.toLowerCase() === item.name.toLowerCase()
      );

      if (exists) {
        toast("Ya existe una suscripción parecida");
        return;
      }

      const cancelUrl = getCancelUrl(item.name + " " + item.plan);

      subs.unshift({
        ...item,
        cancelUrl,
        id: crypto.randomUUID()
      });

      save();
      render();
      toast(`Detectamos ${item.name}`);
    }

    function addManual() {
      const item = {
        name: document.getElementById("name").value.trim(),
        plan: document.getElementById("plan").value.trim() || "Sin plan indicado",
        price: Number(document.getElementById("price").value || 0),
        frequency: document.getElementById("frequency").value,
        date: document.getElementById("date").value,
        source: "Manual"
      };

      if (!item.name) return toast("Poné un nombre");

      addDetected(item);

      document.getElementById("name").value = "";
      document.getElementById("plan").value = "";
      document.getElementById("price").value = "";
      document.getElementById("date").value = "";
      document.getElementById("manualBox").style.display = "none";
    }

    function deleteSub(id) {
      subs = subs.filter(s => s.id !== id);
      save();
      render();
      toast("Suscripción eliminada");
    }

    function render() {
      const list = document.getElementById("list");
      const search = document.getElementById("search").value.toLowerCase();

      const filtered = subs.filter(s =>
        s.name.toLowerCase().includes(search) ||
        (s.plan || "").toLowerCase().includes(search)
      );

      const total = subs.reduce((acc, s) => acc + monthlyCost(s), 0);
      document.getElementById("total").innerText = money(total);
      document.getElementById("count").innerText = `${subs.length} activas`;

      const weekTotal = subs
        .filter(s => {
          const d = daysUntil(s.date);
          return d !== null && d >= 0 && d <= 7;
        })
        .reduce((acc, s) => acc + Number(s.price || 0), 0);

      const alertBox = document.getElementById("weekAlert");
      if (weekTotal > 0) {
        alertBox.style.display = "block";
        alertBox.innerText = `⚠️ Esta semana te cobran ${money(weekTotal)}`;
      } else {
        alertBox.style.display = "none";
      }

      if (!filtered.length) {
        list.innerHTML = `<div class="empty">No hay suscripciones cargadas.</div>`;
        return;
      }

      list.innerHTML = filtered.map(s => {
        const d = daysUntil(s.date);
        const renewal = d === null
          ? "Sin fecha de renovación"
          : d === 0
            ? "Hoy te cobran"
            : d > 0
              ? `En ${d} días`
              : "Fecha pasada";

        const cancelUrl = s.cancelUrl || getCancelUrl(s.name + " " + s.plan);

        return `
          <article class="card">
            <div class="cardTop">
              <div>
                <h3>${s.name}</h3>
                <p>${s.plan || "Sin plan indicado"}</p>
              </div>
              <div class="price">
                ${money(s.price)}
                <p>${s.frequency === "yearly" ? "año" : "mes"}</p>
              </div>
            </div>

            <div class="renewal">🔔 ${renewal}</div>

            <div class="details">
              <p><b>Origen:</b> ${s.source || "Manual"}</p>
              <p><b>Coste mensual estimado:</b> ${money(monthlyCost(s))}</p>
            </div>

            <div class="cardActions">
              ${cancelUrl ? `<a class="smallBtn cancelBtn" href="${cancelUrl}" target="_blank">Cancelar</a>` : ""}
              <button class="smallBtn deleteBtn" onclick="deleteSub('${s.id}')">Eliminar</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function openManual() {
      const box = document.getElementById("manualBox");
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    function activateReminders() {
      toast("Recordatorios activados");
    }

    function demoSMS() {
      toast("La búsqueda por SMS todavía está en prueba");
    }

    function toast(msg) {
      alert(msg);
    }

    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");

    if (data) {
      try {
        const detected = JSON.parse(decodeURIComponent(data));
        detected.forEach(s => {
          addDetected({
            name: s.from || "Suscripción detectada",
            plan: s.subject || "Detectada por correo",
            price: 0,
            frequency: "monthly",
            date: "",
            source: "Correo"
          });
        });

        window.history.replaceState({}, document.title, "/");
      } catch (e) {
        console.error(e);
      }
    }

    render();
  </script>
</body>
</html>
