<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubAlert</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, #32155f, #080711 55%);
      color: white;
      padding: 38px 22px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .label {
      color: #b79cff;
      letter-spacing: 4px;
      font-weight: bold;
      font-size: 14px;
    }

    h1 {
      font-size: 54px;
      margin: 10px 0 8px;
    }

    .subtitle {
      color: #bfb6d8;
      font-size: 22px;
      margin-bottom: 28px;
    }

    .add {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      border: 0;
      background: #7c35ff;
      color: white;
      font-size: 42px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .dashboard {
      display: grid;
      gap: 14px;
      margin: 24px 0;
    }

    .summary {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 30px;
      padding: 26px;
    }

    .summary p {
      color: #bfb6d8;
      font-size: 19px;
      margin: 0 0 10px;
    }

    .total {
      font-size: 48px;
      font-weight: bold;
    }

    .miniGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .miniCard {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 18px;
    }

    .miniCard span {
      display: block;
      color: #bfb6d8;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .miniCard strong {
      font-size: 24px;
    }

    .saving {
      background: rgba(255, 90, 110, .18);
      border-color: rgba(255, 120, 140, .25);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn, .reminder {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 22px;
      padding: 18px;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .reminder {
      margin: 18px 0;
      background: linear-gradient(90deg, #8a3cff, #6723d4);
      border: 0;
      width: 100%;
    }

    .manualBox {
      display: none;
      margin: 22px 0;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 28px;
      padding: 20px;
    }

    .manualBox h2 {
      margin-top: 0;
      font-size: 26px;
    }

    input, select, textarea {
      width: 100%;
      padding: 17px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 17px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input::placeholder, textarea::placeholder {
      color: #aaa;
    }

    select option {
      color: black;
    }

    .sectionTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 26px;
    }

    .sectionTitle h2 {
      font-size: 28px;
      margin: 0;
    }

    .count {
      color: #bfb6d8;
      font-size: 18px;
    }

    .empty {
      margin-top: 18px;
      padding: 28px;
      text-align: center;
      color: #bfb6d8;
      background: rgba(255,255,255,.07);
      border-radius: 28px;
    }

    .card {
      margin-top: 16px;
      padding: 22px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 26px;
    }

    .card.low {
      border-color: rgba(255, 120, 140, .45);
      background: rgba(255, 80, 110, .12);
    }

    .cardTop {
      display: flex;
      justify-content: space-between;
      gap: 14px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .card p {
      color: #bfb6d8;
      margin: 5px 0;
    }

    .price {
      text-align: right;
      font-size: 22px;
      font-weight: bold;
      min-width: 90px;
    }

    .renewal {
      margin-top: 14px;
      color: #ffd7dc;
      font-weight: bold;
    }

    .suggestion {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 180, 60, .15);
      color: #ffe2a8;
      font-weight: bold;
    }

    .details {
      margin-top: 12px;
      font-size: 14px;
      color: #bfb6d8;
    }

    .cardActions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .smallBtn {
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .cancelBtn { color: #ffb3c0; }
    .reviewBtn { color: #ffe2a8; }
    .keepBtn { color: #a7ffca; }
    .deleteBtn { color: #ff6b7a; }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: #d7ccff;
      font-size: 13px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="top">
    <div>
      <div class="label">MEMORIA DIGITAL</div>
      <h1>SubAlert</h1>
      <div class="subtitle">Nunca más una suscripción sorpresa.</div>
    </div>

    <button class="add" onclick="openManual()">+</button>
  </div>

  <div class="dashboard">
    <div class="summary">
      <p>Total mensual estimado</p>
      <div class="total" id="total">0,00 €</div>
    </div>

    <div class="miniGrid">
      <div class="miniCard">
        <span>Próximos 7 días</span>
        <strong id="weekTotal">0,00 €</strong>
      </div>

      <div class="miniCard saving">
        <span>Ahorro potencial</span>
        <strong id="savingTotal">0,00 €</strong>
      </div>
    </div>
  </div>
<div id="onboarding" style="margin-top:20px;padding:20px;background:rgba(255,255,255,.08);border-radius:20px;">
  <p style="margin:0 0 10px;font-weight:bold;">Empezá en 10 segundos 👇</p>
  <p style="margin:0 0 14px;color:#bfb6d8;">Agregá al menos 1 suscripción para ver tu gasto real.</p>
  <button onclick="openManual()" style="padding:14px 18px;border-radius:14px;background:#7c35ff;color:white;border:0;font-weight:bold;">
    + Agregar primera suscripción
  </button>
</div>
  <div class="actions">
    <a class="btn" href="/api/auth/google">🔍 Buscar en correo</a>
    <button class="btn" onclick="demoSMS()">📱 Buscar por SMS</button>
  </div>

  <button class="reminder" onclick="activateReminders()">🔔 Activar recordatorios</button>

  <div class="manualBox" id="manualBox">
    <h2>Agregar suscripción</h2>

    <input id="name" placeholder="Nombre: Netflix, Canva, ChatGPT..." />
    <input id="plan" placeholder="Plan: Premium, Pro, Plus..." />
    <input id="price" type="number" step="0.01" placeholder="Precio" />

    <select id="currency">
      <option value="EUR">EUR (€)</option>
      <option value="USD">USD ($)</option>
    </select>

    <select id="frequency">
      <option value="monthly">Mensual</option>
      <option value="yearly">Anual</option>
      <option value="trial">Trial / prueba</option>
    </select>

    <input id="date" type="date" />

    <select id="usage">
      <option value="alta">Uso alto</option>
      <option value="media">Uso medio</option>
      <option value="baja">Uso bajo / casi no la uso</option>
    </select>

    <textarea id="notes" placeholder="Notas: cuenta asociada, tarjeta, motivo, etc."></textarea>

    <button class="reminder" onclick="addManual()">Guardar suscripción</button>
  </div>

  <input id="search" placeholder="Buscar suscripción..." oninput="render()" />

  <div class="sectionTitle">
    <h2>Suscripciones</h2>
    <div class="count" id="count">0 activas</div>
  </div>

  <div id="list"></div>

  <script>
    const cancelLinks = {
      netflix: "https://www.netflix.com/cancelplan",
      spotify: "https://www.spotify.com/account/subscription/",
      chatgpt: "https://help.openai.com/en/articles/7232927-how-do-i-cancel-my-chatgpt-plus-subscription",
      openai: "https://help.openai.com/en/articles/7232927-how-do-i-cancel-my-chatgpt-plus-subscription",
      canva: "https://www.canva.com/settings/billing",
      amazon: "https://www.amazon.es/gp/primecentral",
      disney: "https://www.disneyplus.com/account",
      moises: "https://moises.ai/account",
      suno: "https://suno.com/account",
      youtube: "https://www.youtube.com/paid_memberships",
      google: "https://myaccount.google.com/payments-and-subscriptions",
      apple: "https://support.apple.com/billing",
      afa: "https://afaplay.tv",
      prime: "https://www.amazon.es/gp/primecentral"
    };

    let subs = JSON.parse(localStorage.getItem("subs") || "[]");

    function save() {
      localStorage.setItem("subs", JSON.stringify(subs));
    }

    function money(n, currency = "EUR") {
      const symbol = currency === "USD" ? "$" : "€";
      return Number(n || 0).toLocaleString("es-ES", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + " " + symbol;
    }

    function monthlyCost(s) {
      const price = Number(s.price || 0);
      if (s.frequency === "yearly") return price / 12;
      return price;
    }

    function daysUntil(date) {
      if (!date) return null;

      const today = new Date();
      const target = new Date(date);

      today.setHours(0,0,0,0);
      target.setHours(0,0,0,0);

      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function getCancelUrl(name) {
      const text = (name || "").toLowerCase();

      for (const key in cancelLinks) {
        if (text.includes(key)) return cancelLinks[key];
      }

      return "";
    }

    function openManual() {
      const box = document.getElementById("manualBox");
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    function addManual() {
      const item = {
        name: document.getElementById("name").value.trim(),
        plan: document.getElementById("plan").value.trim() || "Sin plan indicado",
        price: Number(document.getElementById("price").value || 0),
        currency: document.getElementById("currency").value,
        frequency: document.getElementById("frequency").value,
        date: document.getElementById("date").value,
        usage: document.getElementById("usage").value,
        notes: document.getElementById("notes").value.trim(),
        source: "Manual"
      };

      if (!item.name) return toast("Poné un nombre");
      if (!item.price) return toast("Poné un precio");

      addDetected(item);

      document.getElementById("name").value = "";
      document.getElementById("plan").value = "";
      document.getElementById("price").value = "";
      document.getElementById("date").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("manualBox").style.display = "none";
    }

    function addDetected(item) {
      const exists = subs.some(s =>
        s.name.toLowerCase() === item.name.toLowerCase()
      );

      if (exists) {
        toast("Ya existe una suscripción parecida");
        return;
      }

      const cancelUrl = getCancelUrl(item.name + " " + item.plan);

      subs.unshift({
        ...item,
        cancelUrl,
        reviewed: false,
        keep: false,
        id: crypto.randomUUID()
      });

      save();
      render();
      toast(`Detectamos ${item.name}`);
    }

    function deleteSub(id) {
      subs = subs.filter(s => s.id !== id);
      save();
      render();
      toast("Suscripción eliminada");
    }

    function markReview(id) {
      subs = subs.map(s =>
        s.id === id ? { ...s, reviewed: true, keep: false } : s
      );

      save();
      render();
      toast("Marcada como innecesaria");
    }

    function markKeep(id) {
      subs = subs.map(s =>
        s.id === id ? { ...s, keep: true, reviewed: false } : s
      );

      save();
      render();
      toast("Marcada como mantener");
    }

    function getRenewalText(s) {
      const d = daysUntil(s.date);

      if (s.frequency === "trial") {
        if (d === null) return "Trial sin fecha de cobro";
        if (d === 0) return "Hoy termina el trial";
        if (d > 0) return `Trial: te pueden cobrar en ${d} días`;
        return "Trial vencido";
      }

      if (d === null) return "Sin fecha de renovación";
      if (d === 0) return "Hoy te cobran";
      if (d > 0) return `En ${d} días`;
      return "Fecha pasada";
    }

    function getSuggestion(s) {
      if (s.keep) return "✅ Marcada como importante. Mantener.";
      if (s.reviewed) return "⚠️ Marcada como posible gasto innecesario.";
      if (s.usage === "baja") return "💸 Uso bajo: podrías cancelar esto.";
      if (s.frequency === "trial") return "🔥 Trial activo: revisá antes de que te cobren.";
      return "";
    }

    function render() {
      const list = document.getElementById("list");
      const search = document.getElementById("search").value.toLowerCase();

      const filtered = subs.filter(s =>
        s.name.toLowerCase().includes(search) ||
        (s.plan || "").toLowerCase().includes(search)
      );

      const totalMonthly = subs.reduce((acc, s) => acc + monthlyCost(s), 0);

      const weekTotal = subs
        .filter(s => {
          const d = daysUntil(s.date);
          return d !== null && d >= 0 && d <= 7;
        })
        .reduce((acc, s) => acc + Number(s.price || 0), 0);

      const savingTotal = subs
        .filter(s => s.usage === "baja" || s.reviewed)
        .reduce((acc, s) => acc + monthlyCost(s), 0);

      document.getElementById("total").innerText = money(totalMonthly);
      document.getElementById("weekTotal").innerText = money(weekTotal);
      document.getElementById("savingTotal").innerText = money(savingTotal);
      document.getElementById("count").innerText = `${subs.length} activas`;

      if (!filtered.length) {
        list.innerHTML = `<div class="empty">No hay suscripciones cargadas.</div>`;
        return;
      }

      list.innerHTML = filtered.map(s => {
        const cancelUrl = s.cancelUrl || getCancelUrl(s.name + " " + s.plan);
        const suggestion = getSuggestion(s);
const warning = s.usage === "baja"
  ? `<div class="suggestion">⚠️ Podrías ahorrar ${money(monthlyCost(s), s.currency)} al mes cancelando esto.</div>`
  : "";

const score = s.usage === "alta"
  ? "🟢"
  : s.usage === "media"
  ? "🟡"
  : "🔴";
        return `
          <article class="card ${s.usage === "baja" || s.reviewed ? "low" : ""}">
            <div class="cardTop">
              <div>
                <h3>${escapeHTML(s.name)}</h3>
                <p>${escapeHTML(s.plan || "Sin plan indicado")}</p>
                <span class="pill">${s.frequency === "yearly" ? "Anual" : s.frequency === "trial" ? "Trial" : "Mensual"}</span>
                <span class="pill">Uso: ${s.usage || "media"}</span>
              </div>

              <div class="price">
                ${money(s.price, s.currency)}
                <p>${s.frequency === "yearly" ? "año" : s.frequency === "trial" ? "trial" : "mes"}</p>
              </div>
            </div>

            <div class="renewal">🔔 ${getRenewalText(s)}</div>

            ${suggestion ? `<div class="suggestion">${suggestion}</div>` : ""}
${warning}
            <div class="details">
              <p><b>Origen:</b> ${s.source || "Manual"}</p>
              <p><b>Coste mensual estimado:</b> ${money(monthlyCost(s), s.currency)}</p>
              ${s.date ? `<p><b>Próximo cobro:</b> ${s.date}</p>` : ""}
              ${s.notes ? `<p><b>Notas:</b> ${escapeHTML(s.notes)}</p>` : ""}
            </div>

            <div class="cardActions">
              ${cancelUrl ? `<a class="smallBtn cancelBtn" href="${cancelUrl}" target="_blank">Cancelar</a>` : ""}
              <button class="smallBtn reviewBtn" onclick="markReview('${s.id}')">No la uso</button>
              <button class="smallBtn keepBtn" onclick="markKeep('${s.id}')">Mantener</button>
              <button class="smallBtn deleteBtn" onclick="deleteSub('${s.id}')">Eliminar</button><button class="smallBtn aiBtn" onclick="analyzeUsage('${s.id}')">🤖 Analizar</button>
            </div>
          </article>
        `;
      }).join("");
 const onboarding = document.getElementById("onboarding");

if (onboarding) {
  if (subs.length === 0) {
    onboarding.style.display = "block";
  } else {
    onboarding.style.display = "none";
  }
}   }

    function escapeHTML(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function activateReminders() {
      toast("Recordatorios activados. Próximo paso: notificaciones reales.");
    }

    function demoSMS() {
      toast("La búsqueda por SMS todavía está en prueba.");
    }

    function toast(msg) {
      alert(msg);
    }

    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");

    if (data) {
      try {
        const detected = JSON.parse(decodeURIComponent(data));

        detected.forEach(s => {
          addDetected({
            name: s.from || "Suscripción detectada",
            plan: s.subject || "Detectada por correo",
            price: 0,
            currency: "EUR",
            frequency: "monthly",
            date: "",
            usage: "media",
            notes: "",
            source: "Correo"
          });
        });

        window.history.replaceState({}, document.title, "/");
      } catch (e) {
        console.error(e);
      }
    }

    render();
  </script>
</body>
</html>
