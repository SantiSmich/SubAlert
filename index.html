<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SubAlert</title>

<style>

body{

  margin:0;

  font-family:Arial;

  background:#0b0715;

  color:white;

  padding:20px 16px 120px;

}

h1{font-size:34px;margin:0}

.card{

  background:#1a142a;

  border-radius:20px;

  padding:16px;

  margin-bottom:14px;

}

button{

  border:0;

  border-radius:12px;

  padding:10px 14px;

  font-weight:bold;

}

.primary{background:#7b3cff;color:white;width:100%;margin-top:10px}

.small{background:#2a203d;color:white}

.danger{color:#ff6b7a}

.good{color:#5dffb3}

.warn{color:#ffd166}

input,textarea{

  width:100%;

  padding:10px;

  border-radius:10px;

  border:1px solid #333;

  background:#120c1f;

  color:white;

  margin-bottom:10px;

}

</style>

</head>

<body>

<h1>SubAlert</h1>

<textarea id="aiInput" placeholder="Ej: Spotify 11.99 mensual renovación 9/5"></textarea>

<button class="primary" onclick="parseAI()">✨ Cargar con IA</button>

<div id="list"></div>

<script>

let subs = JSON.parse(localStorage.getItem("subs")||"[]")

function save(){

  localStorage.setItem("subs",JSON.stringify(subs))

}

function cleanName(line){

  return line

    .replace(/\d+([.,]\d+)?/g,"")

    .replace(/mensual|anual|usd|eur|renovación|renovacion|fecha|\/|\d+/gi,"")

    .trim()

}

function parseDate(line){

  const m = line.match(/(\d{1,2})\/(\d{1,2})/)

  if(!m) return ""

  const d = new Date()

  const year = d.getFullYear()

  return `${year}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`

}

function parseAI(){

  const lines = document.getElementById("aiInput").value.split(",")

  lines.forEach(l=>{

    const line = l.trim()

    if(!line) return

    const priceMatch = line.match(/\d+([.,]\d+)?/)

    if(!priceMatch) return

    const price = Number(priceMatch[0].replace(",","."))

    const name = cleanName(line)

    const date = parseDate(line)

    // evitar duplicados

    const exists = subs.some(s=>s.name.toLowerCase()===name.toLowerCase())

    if(exists) return

    subs.push({

      id:Date.now()+Math.random(),

      name,

      price,

      frequency:"monthly",

      usage:"media",

      date,

      source:"IA"

    })

  })

  save()

  render()

}

function getScore(s){

  let score=0

  if(s.usage==="baja") score+=5

  if(s.usage==="media") score+=2

  if(s.price>10) score+=2

  if(s.price>20) score+=3

  return Math.min(score,10)

}

function getLabel(score){

  if(score>=8) return "🔴 Cancelar ya"

  if(score>=5) return "🟡 Revisar"

  return "🟢 Mantener"

}

function render(){

  const list=document.getElementById("list")

  list.innerHTML=""

  subs.forEach(s=>{

    const score=getScore(s)

    const div=document.createElement("div")

    div.className="card"

    div.innerHTML=`

      <h2>${s.name}</h2>

      <p>${s.price} € / mes</p>

      <p class="${score>=8?"danger":score>=5?"warn":"good"}">${getLabel(score)}</p>

      <p>${s.date ? "Renueva: "+s.date : "Sin fecha"}</p>

      <button class="small" onclick="remove(${s.id})">Eliminar</button>

      <button class="small" onclick="analyze(${s.id})">Analizar</button>

    `

    list.appendChild(div)

  })

}

function remove(id){

  subs=subs.filter(s=>s.id!==id)

  save()

  render()

}

function analyze(id){

  const s=subs.find(x=>x.id===id)

  const score=getScore(s)

  let msg="Score cancelación: "+score+"/10\n\n"

  if(score>=8){

    msg+="CANCELAR YA"

  }else if(score>=5){

    msg+="Podrías revisarla"

  }else{

    msg+="Vale la pena mantenerla"

  }

  alert(msg)

}

render()

</script>

</body>

</html>
