<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubAlert</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

h1 {
  font-size:28px;
}

.total {
  margin:20px 0;
  font-size:22px;
}

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border-left:5px solid #4caf50;
}

.card.alert {
  border-left:5px solid red;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:white;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

</style>

</head>

<body>

<h1>SubAlert 🚀</h1>

<div class="total" id="total">Total: 0€</div>

<div id="list"></div>

<button onclick="addSub()">+ Agregar suscripción</button>

<script>

let subs = [];

function render() {
  let total = 0;
  let html = "";

  subs.forEach((s,i) => {
    total += s.price;

    let days = Math.ceil((new Date(s.date) - new Date()) / (1000*60*60*24));

    let alert = days <= 3 ? "alert" : "";

    html += `
    <div class="card ${alert}">
      <b>${s.name}</b><br>
      ${s.price}€ / mes<br>
      Se renueva en ${days} días
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("total").innerText = "Total: " + total + "€";
}

function addSub() {
  let name = prompt("Nombre:");
  let price = parseFloat(prompt("Precio:"));
  let date = prompt("Fecha (YYYY-MM-DD):");

  subs.push({name, price, date});
  render();
}

render();

</script>

</body>
</html>
